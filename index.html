<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SadeTrade — Crypto Signal Terminal v4</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;600;700&display=swap" media="print" onload="this.media='all'">
<style>
:root{
  --bg:#f0f4f8;--bg2:#ffffff;--panel:#ffffff;--panel2:#f5f8fc;
  --border:#dde3ef;--border2:#c8d2e8;
  --buy:#00b87a;--buy-light:#e6f9f3;
  --sell:#e8334a;--sell-light:#fdedf0;
  --neutral:#4b6cf7;--neut-light:#eef1fe;
  --warn:#e68a00;--warn-light:#fff4e0;
  --text:#1e2d4a;--muted:#7a8db3;--dim:#c2ccde;--white:#ffffff;
  --mono:'IBM Plex Mono','Courier New',monospace;
  --sans:'IBM Plex Sans',system-ui,-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;min-height:100vh;overflow-x:hidden}
.header{background:var(--white);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 1px 8px rgba(30,45,74,0.06)}
.brand{font-family:var(--mono);font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px;color:var(--text)}
.brand-mark{background:linear-gradient(135deg,#00b87a,#4b6cf7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ws-pill{display:flex;align-items:center;gap:6px;background:var(--buy-light);border:1px solid rgba(0,184,122,0.3);border-radius:6px;padding:4px 12px;font-family:var(--mono);font-size:11px;color:var(--buy)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--buy)}
.blink{animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.tick-counter{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--panel2);border:1px solid var(--border);border-radius:5px;padding:3px 10px}
.tick-counter span{color:var(--buy);font-weight:700}
.hdr-right{display:flex;align-items:center;gap:10px}
.last-update{font-family:var(--mono);font-size:10px;color:var(--muted)}
.layout{display:grid;grid-template-columns:205px 1fr;min-height:calc(100vh - 52px)}
.sidebar{background:var(--white);border-right:1px solid var(--border);padding:12px 8px;overflow-y:auto;position:sticky;top:52px;height:calc(100vh - 52px);scrollbar-width:thin}
.sb-label{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:0 6px;margin-bottom:8px}
.coin-btn{display:flex;align-items:center;gap:7px;width:100%;padding:7px 8px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--text);cursor:pointer;transition:background .1s;margin-bottom:2px;font-family:var(--sans);font-size:12px;text-align:left}
.coin-btn:hover{background:var(--panel2);border-color:var(--border)}
.coin-btn.active{background:var(--neut-light);border-color:var(--border2)}
.coin-sym{font-weight:700;font-size:12px;flex:1}
.coin-price-sb{font-family:var(--mono);font-size:10px;color:var(--muted)}
.coin-price-sb.up{color:var(--buy)}.coin-price-sb.dn{color:var(--sell)}
.sig-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sb-divider{border:none;border-top:1px solid var(--border);margin:10px 0}
.tf-row{display:flex;gap:4px;flex-wrap:wrap;padding:0 4px}
.tf-btn{flex:1;padding:5px 3px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--mono);font-size:10px;font-weight:600;cursor:pointer;transition:all .1s;text-align:center;min-width:28px}
.tf-btn.active{background:var(--neut-light);border-color:var(--neutral);color:var(--neutral)}
.btn-all{width:100%;margin-top:8px;padding:7px;border-radius:6px;border:1px dashed var(--border2);background:transparent;color:var(--neutral);font-family:var(--mono);font-size:10px;cursor:pointer}
.btn-all:hover{background:var(--neut-light)}
.main{padding:14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.skeleton{background:linear-gradient(90deg,var(--border) 25%,var(--panel2) 50%,var(--border) 75%);background-size:400% 100%;animation:shimmer 1.2s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
.sk-header{height:80px;border-radius:12px;margin-bottom:12px}
.sk-card{height:300px;border-radius:12px;margin-bottom:12px}
.sk-chart{height:200px;border-radius:12px}
.coin-header{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;box-shadow:0 1px 6px rgba(30,45,74,0.05)}
.coin-title{display:flex;align-items:center;gap:10px}
.coin-em{font-size:26px}
.coin-sym-big{font-family:var(--mono);font-size:20px;font-weight:700}
.coin-fullname{font-size:10px;color:var(--muted)}
.live-price-wrap{text-align:right}
.live-price{font-family:var(--mono);font-size:28px;font-weight:700;will-change:color}
.live-price.flash-up{color:var(--buy)}.live-price.flash-dn{color:var(--sell)}
.price-chg{font-family:var(--mono);font-size:12px;margin-top:2px}
.up{color:var(--buy)}.dn{color:var(--sell)}
.meta-row{display:flex;gap:14px;flex-wrap:wrap}
.meta-item{text-align:center}
.meta-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.meta-val{font-family:var(--mono);font-size:11px;font-weight:600;margin-top:2px}
.sig-card{background:var(--white);border:2px solid var(--border2);border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(30,45,74,0.07)}
.sig-card.is-buy{border-color:rgba(0,184,122,0.4)}
.sig-card.is-sell{border-color:rgba(232,51,74,0.4)}
.sig-card.is-neut{border-color:rgba(75,108,247,0.35)}
.sig-head{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--border)}
.sig-head.buy-bg{background:var(--buy-light)}.sig-head.sell-bg{background:var(--sell-light)}.sig-head.neut-bg{background:var(--neut-light)}
.sig-type{font-family:var(--mono);font-size:24px;font-weight:700;display:flex;align-items:center;gap:8px}
.sig-type.buy{color:var(--buy)}.sig-type.sell{color:var(--sell)}.sig-type.neut{color:var(--neutral)}
.sig-arrow{font-size:32px;line-height:1}
.badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.badge{font-family:var(--mono);font-size:10px;font-weight:600;padding:4px 10px;border-radius:20px}
.b-buy{background:var(--buy-light);color:var(--buy);border:1px solid rgba(0,184,122,.35)}
.b-sell{background:var(--sell-light);color:var(--sell);border:1px solid rgba(232,51,74,.35)}
.b-neut{background:var(--neut-light);color:var(--neutral);border:1px solid rgba(75,108,247,.3)}
.b-bull{background:var(--buy-light);color:var(--buy);border:1px solid rgba(0,184,122,.25)}
.b-bear{background:var(--sell-light);color:var(--sell);border:1px solid rgba(232,51,74,.25)}
.b-side{background:var(--warn-light);color:var(--warn);border:1px solid rgba(230,138,0,.25)}
.b-conf-h{background:var(--buy-light);color:var(--buy);border:1px solid rgba(0,184,122,.25)}
.b-conf-m{background:var(--warn-light);color:var(--warn);border:1px solid rgba(230,138,0,.25)}
.b-conf-l{background:var(--sell-light);color:var(--sell);border:1px solid rgba(232,51,74,.25)}
.sig-body{background:var(--white);padding:16px 18px}
.sig-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.sig-cell{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.sc-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:6px}
.sc-val{font-family:var(--mono);font-size:15px;font-weight:700}
.sc-val.entry{color:var(--neutral)}.sc-val.sl{color:var(--sell)}.sc-val.tp{color:var(--buy)}.sc-val.rr{color:var(--warn)}
.sc-sub{font-size:10px;color:var(--muted);margin-top:3px;font-family:var(--mono)}
.conf-wrap{margin-bottom:14px}
.conf-top{display:flex;justify-content:space-between;margin-bottom:5px}
.conf-lbl{font-size:10px;color:var(--muted);font-weight:500}
.conf-pct{font-family:var(--mono);font-size:12px;font-weight:700}
.conf-track{height:7px;background:var(--panel2);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.conf-fill{height:100%;border-radius:4px;transition:width .5s ease}
.validity-bar{background:var(--warn-light);border:1px solid rgba(230,138,0,.25);border-radius:8px;padding:8px 12px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.validity-label{font-size:10px;color:var(--warn);font-weight:600;font-family:var(--mono);display:flex;align-items:center;gap:5px}
.validity-timer{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--warn)}
.validity-note{font-size:10px;color:var(--muted)}
.reason-box{background:var(--panel2);border:1px solid var(--border);border-left:3px solid;border-radius:0 10px 10px 0;padding:12px 14px;margin-bottom:14px}
.reason-box.buy{border-left-color:var(--buy)}.reason-box.sell{border-left-color:var(--sell)}.reason-box.neut{border-left-color:var(--neutral)}
.r-title{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:6px;font-weight:600}
.r-points{list-style:none}
.r-points li{font-size:11px;color:var(--text);padding:3px 0;line-height:1.5;display:flex;align-items:flex-start;gap:5px}
.r-arrow{color:var(--muted);flex-shrink:0}
.ind-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.ind-cell{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:9px 10px;text-align:center}
.ind-name{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px}
.ind-val{font-family:var(--mono);font-size:12px;font-weight:700}
.ind-val.bull{color:var(--buy)}.ind-val.bear{color:var(--sell)}.ind-val.neut{color:var(--warn)}
.pos-panel{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:0 1px 6px rgba(30,45,74,0.05)}
.pos-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.pos-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.pos-input-wrap{display:flex;flex-direction:column;gap:4px}
.pos-lbl{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.8px}
.pos-input{background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none;width:100%}
.pos-input:focus{border-color:var(--neutral)}
.pos-results{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pos-res-cell{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center}
.pos-res-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px}
.pos-res-val{font-family:var(--mono);font-size:14px;font-weight:700}
.pos-warning{font-size:10px;color:var(--sell);margin-top:8px;font-weight:600;display:none}
.sent-panel{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:0 1px 6px rgba(30,45,74,0.05)}
.sent-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sent-block{display:flex;flex-direction:column;gap:8px}
.sent-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.fg-arc-wrap{display:flex;align-items:center;gap:10px}
.fg-num{font-family:var(--mono);font-size:28px;font-weight:700}
.fg-label{font-size:10px;color:var(--muted)}
.ls-bar-wrap{display:flex;flex-direction:column;gap:4px}
.ls-bar-track{height:10px;border-radius:5px;overflow:hidden;background:var(--sell-light);border:1px solid var(--border)}
.ls-bar-fill{height:100%;background:var(--buy);border-radius:5px;transition:width .4s}
.ls-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px}
/* FOREX PANEL */
.forex-panel{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:0 1px 6px rgba(30,45,74,0.05)}
.forex-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.forex-cell{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center;cursor:default}
.forex-pair{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px;font-weight:700}
.forex-rate{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text)}
.forex-chg{font-family:var(--mono);font-size:9px;margin-top:2px}
.chart-panel{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:0 1px 6px rgba(30,45,74,0.05)}
.chart-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.chart-title-txt{font-size:12px;font-weight:700}
.chart-meta{font-family:var(--mono);font-size:10px;color:var(--muted)}
.alert-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--panel2);color:var(--text);font-family:var(--mono);font-size:11px;cursor:pointer;font-weight:600}
.alert-btn.active-alert{background:var(--buy-light);border-color:var(--buy);color:var(--buy)}
.ov-panel{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 6px rgba(30,45,74,0.05)}
.ov-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.ov-title{font-size:12px;font-weight:700}
.ov-table{width:100%;border-collapse:collapse}
.ov-table th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);padding:8px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--panel2)}
.ov-table td{padding:10px 14px;font-family:var(--mono);font-size:11px;border-bottom:1px solid var(--border);white-space:nowrap}
.ov-table tbody tr{cursor:pointer}
.ov-table tbody tr:hover td{background:var(--panel2)}
.ov-table tbody tr:last-child td{border-bottom:none}
.ov-coin{display:flex;align-items:center;gap:7px}
.ov-em{font-size:14px}
.ov-sym2{font-weight:700}.ov-full2{font-size:9px;color:var(--muted);font-family:var(--sans)}
.td-buy{color:var(--buy)!important;font-weight:700}.td-sell{color:var(--sell)!important;font-weight:700}.td-neut{color:var(--neutral)!important;font-weight:700}
.up-txt{color:var(--buy)}.dn-txt{color:var(--sell)}
.ord-tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700}
.ord-buy{background:var(--buy-light);color:var(--buy)}.ord-sell{background:var(--sell-light);color:var(--sell)}.ord-neut{background:var(--neut-light);color:var(--neutral)}
.loading-ovl{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--buy);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-family:var(--mono);font-size:12px;color:var(--muted)}
.err-box{background:var(--sell-light);border:1px solid rgba(232,51,74,0.3);border-radius:8px;padding:14px;font-size:12px;color:var(--sell);font-family:var(--mono);line-height:1.7}
.disclaimer{background:var(--warn-light);border:1px solid rgba(230,138,0,0.2);border-radius:8px;padding:9px 14px;font-size:11px;color:var(--muted);line-height:1.6}
.disclaimer strong{color:var(--warn)}
.ws-status{font-family:var(--mono);font-size:10px;color:var(--muted);display:flex;align-items:center;gap:5px}
.ws-ok{color:var(--buy)}.ws-err{color:var(--sell)}.ws-wait{color:var(--warn)}
.ai-panel{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:0 1px 6px rgba(30,45,74,0.05)}
.ai-panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.ai-title{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.ai-badge{font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:10px;background:linear-gradient(135deg,#ff6b6b22,#ffa50022);border:1px solid var(--border2);color:#e65c00;font-weight:700}
.ai-ask-btn{padding:10px;border-radius:7px;border:none;background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;width:100%}
.ai-ask-btn:disabled{opacity:.5;cursor:not-allowed}
.ai-output{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;min-height:60px;font-size:12px;line-height:1.7;font-family:var(--sans);white-space:pre-wrap;word-break:break-word}
.ai-output.loading{color:var(--muted);font-style:italic}
.ai-output.error{color:var(--sell)}
.ai-fields{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.ai-field-cell{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center}
.ai-field-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px}
.ai-field-val{font-family:var(--mono);font-size:13px;font-weight:700}
.ai-field-val.entry{color:var(--neutral)}.ai-field-val.sl{color:var(--sell)}.ai-field-val.tp{color:var(--buy)}
.ai-disclaimer{font-size:10px;color:var(--muted);margin-top:8px;line-height:1.5}
#toasts{position:fixed;bottom:18px;right:18px;z-index:999;display:flex;flex-direction:column;gap:5px}
.toast{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:var(--mono);font-size:11px;box-shadow:0 4px 20px rgba(30,45,74,0.12);animation:slideUp .2s ease;max-width:300px}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(30,45,74,.35);z-index:500;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:22px;width:340px;box-shadow:0 8px 40px rgba(30,45,74,.15)}
.modal-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.modal-input{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:var(--mono);font-size:13px;outline:none;margin-bottom:10px}
.modal-input:focus{border-color:var(--neutral)}
.modal-note{font-size:10px;color:var(--muted);margin-bottom:14px;line-height:1.5}
.modal-btns{display:flex;gap:8px}
.modal-confirm{flex:1;padding:9px;border-radius:8px;border:none;background:var(--neutral);color:var(--white);font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer}
.modal-cancel{padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--mono);font-size:12px;cursor:pointer}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
@media(max-width:880px){
  .layout{grid-template-columns:1fr}
  .sidebar{position:static;height:auto;display:flex;flex-wrap:wrap;gap:8px;padding:10px}
  .sig-grid{grid-template-columns:repeat(2,1fr)}
  .ind-row{grid-template-columns:repeat(3,1fr)}
  .pos-grid{grid-template-columns:1fr 1fr}
  .pos-results{grid-template-columns:1fr 1fr}
  .sent-row{grid-template-columns:1fr}
  .forex-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:540px){
  .sig-grid{grid-template-columns:1fr 1fr}
  .ind-row{grid-template-columns:repeat(2,1fr)}
  .pos-grid{grid-template-columns:1fr}

// ═══════════════════════════════════
//  TECHNICAL ANALYSIS
// ═══════════════════════════════════
const sma=(arr,n)=>arr.length<n?null:arr.slice(-n).reduce((a,b)=>a+b,0)/n;
function ema(arr,n){
  if(arr.length<n)return null;
  const k=2/(n+1);let v=arr.slice(0,n).reduce((a,b)=>a+b,0)/n;
  for(let i=n;i<arr.length;i++)v=arr[i]*k+v*(1-k);
  return v;
}
function rsi(prices,n=14){
  if(prices.length<n+1)return 50;
  let g=0,l=0;const s=prices.slice(-n-1);
  for(let i=1;i<s.length;i++){const d=s[i]-s[i-1];d>0?g+=d:l+=Math.abs(d);}
  const ag=g/n,al=l/n;return al===0?100:100-(100/(1+ag/al));
}
function macd(prices){
  if(prices.length<26)return null;
  const e12=ema(prices,12),e26=ema(prices,26);
  if(!e12||!e26)return null;
  const line=e12-e26;return{line,signal:line*0.85,hist:line*0.15};
}
function bb(prices,n=20,mult=2){
  if(prices.length<n)return null;
  const sl=prices.slice(-n);
  const mean=sl.reduce((a,b)=>a+b,0)/n;
  const std=Math.sqrt(sl.reduce((a,b)=>a+(b-mean)**2,0)/n);
  return{upper:mean+mult*std,mid:mean,lower:mean-mult*std,std};
}
function atr(candles,n=14){
  if(candles.length<n+1)return candles[candles.length-1]?.c*0.01||1;
  let sum=0;
  for(let i=candles.length-n;i<candles.length;i++){
    const tr=Math.max(candles[i].h-candles[i].l,Math.abs(candles[i].h-candles[i-1].c),Math.abs(candles[i].l-candles[i-1].c));
    sum+=tr;
  }
  return Math.max(sum/n,candles[candles.length-1].c*0.003);
}
function stochRSI(prices,period=14){
  const r=rsi(prices,period);
  const s=prices.slice(-period);
  const mn=Math.min(...s),mx=Math.max(...s);
  return mx===mn?50:((prices[prices.length-1]-mn)/(mx-mn))*100;
}
// Swing highs/lows kwa kuona support/resistance halisi
function findSwingLevels(candles,lookback=30){
  const n=Math.min(lookback,candles.length);
  const recent=candles.slice(-n);
  const highs=recent.map(c=>c.h);
  const lows=recent.map(c=>c.l);
  // Cluster-based: pata kiwango kinachoonekana mara nyingi
  const resistance=Math.max(...highs);
  const support=Math.min(...lows);
  // Kiwango cha kati (pivot)
  const pivot=(resistance+support+recent[recent.length-1].c)/3;
  const r1=2*pivot-support;
  const s1=2*pivot-resistance;
  return{resistance,support,pivot,r1,s1};
}

// ═══════════════════════════════════
//  SIGNAL ENGINE (Iliyoboreshwa)
// ═══════════════════════════════════
function computeSignalFromCandles(coin,candles){
  if(!candles||candles.length<20)return;
  const closes=candles.map(c=>c.c);
  const highs=candles.map(c=>c.h);
  const lows=candles.map(c=>c.l);
  const vols=candles.map(c=>c.v);
  const current=closes[closes.length-1];
  const prevClose=closes[closes.length-2]||current;
  const d=S.prices[coin.id]||{price:current,chg24h:0};

  const RSI=rsi(closes,14);
  const SMA20=sma(closes,Math.min(20,closes.length));
  const SMA50=sma(closes,Math.min(50,closes.length));
  const EMA9=ema(closes,Math.min(9,closes.length));
  const EMA12=ema(closes,Math.min(12,closes.length));
  const EMA26=ema(closes,Math.min(26,closes.length));
  const BB=bb(closes,Math.min(20,closes.length));
  const MACD=macd(closes);
  const ATR=atr(candles,Math.min(14,candles.length-1));
  const StochRSI=stochRSI(closes,14);

  const avgVol=vols.slice(-10).reduce((a,b)=>a+b,0)/10;
  const volMomentum=vols[vols.length-1]/Math.max(avgVol,0.0001);
  const roc5=closes.length>5?((current-closes[closes.length-6])/closes[closes.length-6])*100:0;
  const roc3=closes.length>3?((current-closes[closes.length-4])/closes[closes.length-4])*100:0;

  // Swing levels
  const swings=findSwingLevels(candles,30);
  const {resistance,support,pivot,r1,s1}=swings;
  const distToRes=(resistance-current)/current*100;
  const distToSup=(current-support)/current*100;

  // Candle pattern
  const lastCandle=candles[candles.length-1];
  const prevCandle=candles[candles.length-2]||lastCandle;
  const candleBody=Math.abs(lastCandle.c-lastCandle.o);
  const candleRange=lastCandle.h-lastCandle.l||0.001;
  const upperWick=(lastCandle.h-Math.max(lastCandle.o,lastCandle.c))/candleRange;
  const lowerWick=(Math.min(lastCandle.o,lastCandle.c)-lastCandle.l)/candleRange;
  const isBullishEngulf=lastCandle.c>lastCandle.o&&prevCandle.c<prevCandle.o&&lastCandle.c>prevCandle.o&&lastCandle.o<prevCandle.c;
  const isBearishEngulf=lastCandle.c<lastCandle.o&&prevCandle.c>prevCandle.o&&lastCandle.c<prevCandle.o&&lastCandle.o>prevCandle.c;

  let bull=0,bear=0,reasons=[],inds={};

  // RSI
  if(RSI<25){bull+=4;reasons.push('RSI '+RSI.toFixed(0)+' — Oversold Kali: rebound inatarajiwa');inds.rsi='bull';}
  else if(RSI<35){bull+=3;reasons.push('RSI '+RSI.toFixed(0)+' — Oversold: nguvu ya kununua');inds.rsi='bull';}
  else if(RSI<45){bull+=1;inds.rsi='bull';}
  else if(RSI>75){bear+=4;reasons.push('RSI '+RSI.toFixed(0)+' — Overbought Kali: marekebisho yanaweza kutokea');inds.rsi='bear';}
  else if(RSI>65){bear+=3;reasons.push('RSI '+RSI.toFixed(0)+' — Overbought: hatari ya kushuka');inds.rsi='bear';}
  else if(RSI>55){bear+=1;inds.rsi='bear';}
  else inds.rsi='neut';

  // SMA
  if(SMA20&&SMA50){
    if(SMA20>SMA50*1.002){bull+=2;reasons.push('SMA20 > SMA50 — Uptrend (Golden Cross)');inds.sma='bull';}
    else if(SMA20<SMA50*0.998){bear+=2;reasons.push('SMA20 < SMA50 — Downtrend (Death Cross)');inds.sma='bear';}
    else inds.sma='neut';
  }else inds.sma='neut';

  // EMA
  if(EMA12&&EMA26){
    if(EMA12>EMA26*1.001){bull+=2;reasons.push('EMA12 juu ya EMA26 — Momentum ya kununua');inds.ema='bull';}
    else if(EMA12<EMA26*0.999){bear+=2;reasons.push('EMA12 chini ya EMA26 — Momentum ya kuuza');inds.ema='bear';}
    else inds.ema='neut';
  }else inds.ema='neut';

  // Bollinger Bands
  if(BB){
    const bbRange=BB.upper-BB.lower;
    const bbPos=(current-BB.lower)/Math.max(bbRange,0.0001);
    if(current<BB.lower){bull+=3;reasons.push('Bei CHINI ya BB Lower ('+fP(BB.lower)+') — Bounce inawezekana');inds.bb='bull';}
    else if(current>BB.upper){bear+=3;reasons.push('Bei JUU ya BB Upper ('+fP(BB.upper)+') — Pullback inatarajiwa');inds.bb='bear';}
    else if(bbPos<0.2){bull+=2;reasons.push('Bei karibu na BB Lower — Support ya kiufundi');inds.bb='bull';}
    else if(bbPos>0.8){bear+=2;reasons.push('Bei karibu na BB Upper — Resistance ya kiufundi');inds.bb='bear';}
    else inds.bb='neut';
  }else inds.bb='neut';

  // MACD
  if(MACD){
    if(MACD.line>0&&MACD.hist>0){bull+=2;reasons.push('MACD Chanya ('+MACD.line.toFixed(4)+') — Nguvu ya kununua');inds.macd='bull';}
    else if(MACD.line<0&&MACD.hist<0){bear+=2;reasons.push('MACD Hasi ('+MACD.line.toFixed(4)+') — Nguvu ya kuuza');inds.macd='bear';}
    else if(MACD.line>0)inds.macd='bull';
    else if(MACD.line<0)inds.macd='bear';
    else inds.macd='neut';
  }else inds.macd='neut';

  // Stoch RSI
  if(StochRSI<15){bull+=2;reasons.push('Stoch RSI '+StochRSI.toFixed(0)+' — Oversold kali');}
  else if(StochRSI<25)bull+=1;
  else if(StochRSI>85){bear+=2;reasons.push('Stoch RSI '+StochRSI.toFixed(0)+' — Overbought kali');}
  else if(StochRSI>75)bear+=1;

  // Volume
  if(volMomentum>2.0){bull+=2;reasons.push('Volume ('+volMomentum.toFixed(1)+'x avg) — Nguvu kubwa ya soko');}
  else if(volMomentum>1.5)bull+=1;

  // Momentum
  if(roc5>4){bull+=2;reasons.push('Momentum: +'+roc5.toFixed(1)+'% — Nguvu ya juu');}
  else if(roc5>2)bull+=1;
  else if(roc5<-4){bear+=2;reasons.push('Momentum: '+roc5.toFixed(1)+'% — Udhaifu mkubwa');}
  else if(roc5<-2)bear+=1;

  // 24h change
  if(d.chg24h>8){bull+=2;reasons.push('Nguvu ya soko: +'+d.chg24h.toFixed(1)+'% leo — Trend nzuri');}
  else if(d.chg24h>4)bull+=1;
  else if(d.chg24h<-8){bear+=2;reasons.push('Udhaifu wa soko: '+d.chg24h.toFixed(1)+'% — Shinikizo la kuuza');}
  else if(d.chg24h<-4)bear+=1;

  // Candlestick patterns
  if(isBullishEngulf){bull+=2;reasons.push('Bullish Engulfing Pattern — Mwelekeo wa kununua');}
  if(isBearishEngulf){bear+=2;reasons.push('Bearish Engulfing Pattern — Mwelekeo wa kuuza');}
  if(lowerWick>0.6&&RSI<50){bull+=1;reasons.push('Lower wick ndefu — Wanunuzi wanaingilia');}
  if(upperWick>0.6&&RSI>50){bear+=1;reasons.push('Upper wick ndefu — Wauzaji wanaingilia');}

  // Support/Resistance proximity
  if(distToSup<1.5&&distToSup>0){bull+=1;reasons.push('Bei karibu na Support ($'+support.toFixed(4)+') — Bounce inawezekana');}
  if(distToRes<1.5&&distToRes>0){bear+=1;reasons.push('Bei karibu na Resistance ($'+resistance.toFixed(4)+') — Marekebisho yanawezekana');}

  const net=bull-bear;
  const total=Math.max(bull+bear,1);

  // ═══ SIGNAL TYPE — SIDEWAYS haizalishi BUY/SELL ═══
  let type,trend,orderType;
  if(net>=5){type='BUY';trend='BULLISH';orderType=RSI<35||(BB&&current<BB.lower)?'Buy Market':'Buy Limit';}
  else if(net<=-5){type='SELL';trend='BEARISH';orderType=RSI>65||(BB&&current>BB.upper)?'Sell Market':'Sell Limit';}
  else if(net>=2){type='BUY';trend='BULLISH';orderType='Buy Limit';}
  else if(net<=-2){type='SELL';trend='BEARISH';orderType='Sell Limit';}
  else{type='NEUTRAL';trend='SIDEWAYS';orderType='Subiri — Soko Halina Mwelekeo';}

  // ═══ SIDEWAYS override: kama trend ni SIDEWAYS, signal ni NEUTRAL ═══
  // Hii inaepuka upingano wa SIDEWAYS + SELL/BUY
  if(trend==='SIDEWAYS'){
    type='NEUTRAL';
    orderType='Subiri — Soko Halina Mwelekeo';
  }

  // ═══ SELL karibu na Resistance — ukaguzi wa ziada ═══
  // Kama SELL lakini bei iko mbali sana na resistance, signal ni dhaifu
  if(type==='SELL'&&distToRes>3){
    // Bei iko mbali na resistance — SELL si salama
    reasons.unshift('⚠ Bei mbali na Resistance ('+distToRes.toFixed(1)+'%) — Signal dhaifu');
    if(net>=-3){type='NEUTRAL';trend='SIDEWAYS';orderType='Subiri — SELL Dhaifu';}
  }

  // ═══ CONFIDENCE sahihi — hesabu moja tu ═══
  // Tumia wingi wa ushahidi, siyo fraction ya bull vs bear
  // Hii inaepuka upingano wa "50% juu" lakini "67% chini"
  let conf;
  if(type==='NEUTRAL'){
    // Kwa NEUTRAL, uhakika ni mdogo kwa asili
    conf=Math.min(55,Math.max(35,Math.round(35+(total*2))));
  } else {
    // Kwa BUY/SELL: hesabu kulingana na nguvu ya ushahidi
    const dominantScore=type==='BUY'?bull:bear;
    const weakScore=type==='BUY'?bear:bull;
    // Ratio ya ushahidi wa dominant vs total
    const ratio=dominantScore/total;
    // Kiwango cha uhakika: 50-93% kulingana na ushahidi
    conf=Math.min(93,Math.max(50,Math.round(50+(ratio*50))));
  }

  // ═══ ENTRY sahihi zaidi ═══
  let entry;
  if(type==='BUY'){
    if(orderType==='Buy Market'){
      entry=current; // Market order — ingia sasa hivi
    }else{
      // Limit order — subiri pullback kidogo
      const pullback=ATR*0.3;
      entry=Math.max(current-pullback,support*1.001);
      // Kama bei iko juu ya EMA9, ingia karibu na EMA9
      if(EMA9&&EMA9<current)entry=Math.min(entry,EMA9*1.002);
      entry=Math.min(entry,current); // Usizidi bei ya sasa kwa BUY
    }
  }else if(type==='SELL'){
    if(orderType==='Sell Market'){
      entry=current;
    }else{
      const bounce=ATR*0.3;
      entry=Math.min(current+bounce,resistance*0.999);
      if(EMA9&&EMA9>current)entry=Math.max(entry,EMA9*0.998);
      entry=Math.max(entry,current); // Usishuke chini ya bei ya sasa kwa SELL
    }
  }else{
    entry=current;
  }

  // ═══ TF Multiplier — M1 ina noise nyingi, SL lazima iwe kubwa zaidi ═══
  // M1: 2.0x (ilikuwa 1.2x — ilikuwa ndogo sana kwa Bitcoin noise)
  const tfMult=S.tf==='1m'?2.0:S.tf==='5m'?2.0:S.tf==='15m'?2.2:S.tf==='1h'?2.8:S.tf==='4h'?3.2:4.0;
  const atrSL=ATR*tfMult;

  // ═══ SL/TP sahihi zaidi (ATR-based na Structure) ═══
  let sl_p,tp_p;
  // Kiwango cha chini kabisa cha SL: angalau 0.5% ya entry (Bitcoin ina noise kubwa)
  const minSLpct=0.005;

  if(type==='BUY'){
    // SL: chini ya support au ATR kutoka entry — lolote lililo chini zaidi
    const slByATR=entry-atrSL;
    const slBySupport=support-ATR*0.5; // Kidogo chini ya support
    sl_p=Math.max(slByATR,slBySupport); // Tumia ile iliyo karibu zaidi (chini sana ni hatari)
    // Lazima SL iwe angalau 0.5% chini ya entry
    sl_p=Math.min(sl_p,entry*(1-minSLpct));
    // Lakini usizidi 8% ya entry
    sl_p=Math.max(sl_p,entry*(1-0.08));

    // TP: kuelekea resistance au R:R ratio
    const rrTarget=conf>=75?3.0:conf>=65?2.5:2.0;
    const slDistance=Math.abs(entry-sl_p);
    const tpByRR=entry+slDistance*rrTarget;
    const tpByResistance=resistance*0.995;
    // Tumia ile ya chini (conservative) kati ya RR na Resistance
    tp_p=Math.min(tpByRR,tpByResistance);
    // Kama TP ni ndogo sana, tumia RR bila kuzingatia resistance
    if(tp_p<=entry)tp_p=tpByRR;

  }else if(type==='SELL'){
    const slByATR=entry+atrSL;
    const slByResistance=resistance+ATR*0.5;
    sl_p=Math.min(slByATR,slByResistance);
    // Lazima SL iwe angalau 0.5% juu ya entry
    sl_p=Math.max(sl_p,entry*(1+minSLpct));
    sl_p=Math.min(sl_p,entry*(1+0.08));

    const rrTarget=conf>=75?3.0:conf>=65?2.5:2.0;
    const slDistance=Math.abs(sl_p-entry);
    const tpByRR=entry-slDistance*rrTarget;
    const tpBySupport=support*1.005;
    tp_p=Math.max(tpByRR,tpBySupport);
    if(tp_p>=entry)tp_p=tpByRR;

  }else{
    sl_p=entry-atrSL;
    tp_p=entry+atrSL*2;
  }

  const slDistance=Math.abs(entry-sl_p);
  const tpDistance=Math.abs(tp_p-entry);
  const rrRatio=(tpDistance/Math.max(slDistance,0.0001)).toFixed(1);
  const longPct=type==='BUY'?Math.min(85,55+Math.floor(bull)*3):type==='SELL'?Math.max(15,45-Math.floor(bear)*3):50;

  // ═══ Hakikisha reasons zipo kila wakati — kamwe si tupu ═══
  // Kama reasons ni chache, ongeza maelezo ya viashiria vya msingi
  if(reasons.length===0){
    reasons.push('RSI: '+RSI.toFixed(1)+' — '+(RSI<40?'Oversold':RSI>60?'Overbought':'Wastani'));
    if(SMA20&&SMA50)reasons.push('SMA20 '+(SMA20>SMA50?'juu ya':'chini ya')+' SMA50 — '+(SMA20>SMA50?'Uptrend':'Downtrend'));
    if(MACD)reasons.push('MACD: '+(MACD.line>0?'Chanya (bullish)':'Hasi (bearish)'));
    if(BB){
      const bbPos=(current-BB.lower)/(BB.upper-BB.lower);
      reasons.push('BB Position: '+(bbPos*100).toFixed(0)+'% — '+(bbPos<0.3?'Karibu Lower Band':bbPos>0.7?'Karibu Upper Band':'Katikati ya Bands'));
    }
    reasons.push('Soko SIDEWAYS — Viashiria havijatoa ishara wazi ya BUY au SELL');
  }
  if(reasons.length<2){
    reasons.push('StochRSI: '+StochRSI.toFixed(0)+' — '+(StochRSI<30?'Oversold':StochRSI>70?'Overbought':'Wastani'));
  }

  S.signals[coin.id]={
    type,trend,orderType,conf,entry,sl:sl_p,tp:tp_p,rr:rrRatio,
    rsi:RSI,sma20:SMA20,ema9:EMA9,ema12:EMA12,ema26:EMA26,bb:BB,macd:MACD,
    stochRSI:StochRSI,atr:ATR,reasons:reasons.slice(0,6),inds,
    bull,bear,longPct,support,resistance,pivot,r1,s1,
    generatedAt:Date.now(),tf:S.tf,
  };

  if(S.view==='single'&&S.selected.id===coin.id)updateSignalUI();
}

}

//  UPDATE SIGNAL UI
// ═══════════════════════════════════
function updateSignalUI(){
  const sig=S.signals[S.selected.id];if(!sig)return;
  const sc=sig.type==='BUY'?'buy':sig.type==='SELL'?'sell':'neut';
  const typeEl=document.getElementById('sigTypeEl');
  if(typeEl){typeEl.className='sig-type '+sc;const arrow=sig.type==='BUY'?'▲':sig.type==='SELL'?'▼':'→';typeEl.innerHTML=`<span class="sig-arrow">${arrow}</span> ${sig.type}`;}
  const cardEl=document.getElementById('sigCard');if(cardEl)cardEl.className='sig-card is-'+sc;
  const slPct=((Math.abs(sig.entry-sig.sl)/sig.entry)*100).toFixed(2);
  const tpPct=((Math.abs(sig.tp-sig.entry)/sig.entry)*100).toFixed(2);
  const updates={entryVal:fP(sig.entry),slVal:fP(sig.sl),tpVal:fP(sig.tp),rrVal:'1 : '+sig.rr,
    supportVal:sig.support?fP(sig.support):'—',resistanceVal:sig.resistance?fP(sig.resistance):'—',
    pivotVal:sig.pivot?fP(sig.pivot):'—'};
  Object.entries(updates).forEach(([id,val])=>{const el=document.getElementById(id);if(el)el.textContent=val;});
  const slSubEl=document.getElementById('slSub');if(slSubEl)slSubEl.textContent='-'+slPct+'% kutoka Entry';
  const tpSubEl=document.getElementById('tpSub');if(tpSubEl)tpSubEl.textContent='+'+tpPct+'% kutoka Entry';
  const confEl=document.getElementById('confFill');const confPctEl=document.getElementById('confPct');
  const confColor=sig.conf>=70?'var(--buy)':sig.conf<=55?'var(--sell)':'var(--warn)';
  if(confEl){confEl.style.width=sig.conf+'%';confEl.style.background=confColor;}
  if(confPctEl){confPctEl.textContent=sig.conf+'% '+(sig.conf>=70?'(Imara)':sig.conf>=55?'(Wastani)':'(Dhaifu)');confPctEl.style.color=confColor;}
  const lsEl=document.getElementById('lsFill');if(lsEl)lsEl.style.width=sig.longPct+'%';
  const lsLong=document.getElementById('lsLongPct');const lsShort=document.getElementById('lsShortPct');
  if(lsLong)lsLong.textContent='Long '+sig.longPct+'%';if(lsShort)lsShort.textContent='Short '+(100-sig.longPct)+'%';
  const reasonsEl=document.getElementById('reasonsList');
  if(reasonsEl){
    const items=sig.reasons&&sig.reasons.length>0?sig.reasons:['RSI: '+(sig.rsi?sig.rsi.toFixed(1):'—')+' — Inachanganua viashiria...'];
    reasonsEl.innerHTML=items.map(r=>`<li><span class="r-arrow">→</span>${r}</li>`).join('');
  }
}

function startValidityTimer(sig){
  if(S._validityInterval)clearInterval(S._validityInterval);
  const el=document.getElementById('validityTimer');if(!el)return;
  const validSecs=TF_VALIDITY[sig.tf]||3600;
  const tick=()=>{
    const remaining=Math.max(0,validSecs-Math.floor((Date.now()-sig.generatedAt)/1000));
    el.textContent=Math.floor(remaining/60)+':'+(remaining%60<10?'0':'')+(remaining%60);
  };
  tick();S._validityInterval=setInterval(tick,1000);
}

// ═══════════════════════════════════
//  POSITION SIZING
// ═══════════════════════════════════
function calcPositionSize(){
  const capitalEl=document.getElementById('psCapital');const riskEl=document.getElementById('psRisk');
  const sig=S.signals[S.selected.id];if(!capitalEl||!riskEl||!sig)return;
  const capital=parseFloat(capitalEl.value)||0;const riskPct=parseFloat(riskEl.value)||1;
  const entry=sig.entry,sl=sig.sl;
  const slPct=Math.abs(entry-sl)/entry;
  const riskUSD=capital*(riskPct/100);
  const positionUSD=slPct>0?riskUSD/slPct:0;
  const potentialProfit=positionUSD*(parseFloat(sig.rr)||2)*slPct;
  const r=document.getElementById('psRiskUSD');const p=document.getElementById('psPositionUSD');const pr=document.getElementById('psProfit');
  if(r)r.textContent=capital>0?'$'+riskUSD.toFixed(2):'—';
  if(p)p.textContent=positionUSD>0?'$'+positionUSD.toFixed(2):'—';
  if(pr){pr.textContent=potentialProfit>0?'$'+potentialProfit.toFixed(2):'—';pr.style.color=potentialProfit>0?'var(--buy)':'var(--text)';}
  const warn=document.getElementById('psWarning');if(warn)warn.style.display=(positionUSD>capital*0.5&&capital>0)?'block':'none';
}

function openAlertModal(){

  document.getElementById('alertCurrentPrice').textContent=d?fP(d.price):'—';

}
function closeAlertModal(){document.getElementById('alertModal').classList.remove('open');}
function confirmAlert(){
  const sym=S.selected.id;const val=parseFloat(document.getElementById('alertPriceInput').value);
  if(!val||val<=0){toast('⚠ Ingiza bei halali',true);return;}
  S.alerts[sym]=val;closeAlertModal();toast('🔔 Tahadhari: '+sym+' @ '+fP(val));
  const btn=document.getElementById('alertBtn');if(btn)btn.classList.add('active-alert');
}
function checkPriceAlert(sym,currentPrice,prevPrice){
  const target=S.alerts[sym];if(!target)return;
  if((prevPrice<target&&currentPrice>=target)||(prevPrice>target&&currentPrice<=target)){
    toast('🔔 TAHADHARI! '+sym+' @ '+fP(currentPrice));
    delete S.alerts[sym];
    const btn=document.getElementById('alertBtn');if(btn&&S.selected.id===sym)btn.classList.remove('active-alert');
  }
}

function drawChart(coin,interval){
  if(typeof Chart==='undefined')return;
  const key=coin.id+'_'+interval;const candles=S.candles[key];
  if(!candles||candles.length<2)return;
  const el=document.getElementById('coinChart');if(!el)return;
  if(S.chartInst){S.chartInst.destroy();S.chartInst=null;}
  const sig=S.signals[coin.id];
  const color=!sig?'#4b6cf7':sig.type==='BUY'?'#00b87a':sig.type==='SELL'?'#e8334a':'#4b6cf7';
  const step=Math.max(1,Math.floor(candles.length/150));
  const data=candles.filter((_,i)=>i%step===0);
  const labels=data.map(c=>{
    const d=new Date(c.t);
    return interval.endsWith('m')?d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'}):d.toLocaleDateString('en',{month:'short',day:'numeric'});
  });
  const datasets=[{label:'Bei',data:data.map(c=>c.c),borderColor:color,backgroundColor:color+'15',borderWidth:1.5,pointRadius:0,fill:true,tension:0.2}];
  if(sig&&sig.entry){
    datasets.push({label:'Entry ('+fP(sig.entry)+')',data:data.map(()=>sig.entry),borderColor:'#4b6cf7',borderWidth:1.5,borderDash:[5,4],pointRadius:0,fill:false});
    datasets.push({label:'SL ('+fP(sig.sl)+')',data:data.map(()=>sig.sl),borderColor:'#e8334a',borderWidth:1.5,borderDash:[5,4],pointRadius:0,fill:false});
    datasets.push({label:'TP ('+fP(sig.tp)+')',data:data.map(()=>sig.tp),borderColor:'#00b87a',borderWidth:1.5,borderDash:[5,4],pointRadius:0,fill:false});
  }
  S.chartInst=new Chart(el.getContext('2d'),{
    type:'line',data:{labels,datasets},
    options:{
      responsive:true,animation:false,
      plugins:{
        legend:{display:!!sig,position:'top',labels:{color:'#7a8db3',font:{family:'IBM Plex Mono',size:9},boxWidth:20,padding:10}},
        tooltip:{backgroundColor:'#fff',borderColor:'#dde3ef',borderWidth:1,titleColor:'#1e2d4a',bodyColor:'#7a8db3',callbacks:{label:ctx=>' '+fP(ctx.parsed.y)}}
      },
      scales:{
        x:{ticks:{color:'#7a8db3',font:{family:'IBM Plex Mono',size:9},maxTicksLimit:10},grid:{color:'rgba(221,227,239,0.5)'}},
        y:{ticks:{color:'#7a8db3',font:{family:'IBM Plex Mono',size:9}},grid:{color:'rgba(221,227,239,0.5)'}}
      }
    }
  });
  const metaEl=document.getElementById('chartMeta');
  if(metaEl)metaEl.textContent=`${candles.length} candles · ${nowStr()}`;
}

        'Authorization':'Bearer '+KEYS.xai
      },
      body:JSON.stringify({
        model:'grok-3-fast',
        max_tokens:800,
        messages:[
          {role:'system',content:'Wewe ni mtaalam wa crypto trading. Toa uchambuzi wa kina na ushauri wa kiufundi kwa Kiswahili. Fuata muundo ulioulizwa HASA bila kupotoka.'},
          {role:'user',content:prompt}
        ]
      })
    });

    if(!resp.ok){
      const errData=await resp.json().catch(()=>({}));
      const errMsg=errData.error?.message||'HTTP '+resp.status;
      throw new Error(errMsg);
    }

    const data=await resp.json();
    const text=(data.choices||[])[0]?.message?.content?.trim()||'';
    if(!text)throw new Error('Jibu tupu kutoka kwa xAI Grok');

    outEl.className='ai-output';
    outEl.textContent=text;

    // Parse numbers from AI response
    const getField=label=>{
      const patterns=[
        new RegExp(label+'[:\\s]+\\$?([0-9,\\.]+)','i'),
        new RegExp(label+'[:\\s]*\\n?\\$?([0-9,\\.]+)','i'),
      ];
      for(const p of patterns){const m=text.match(p);if(m)return parseFloat(m[1].replace(/,/g,''));}
      return null;
    };
    const entryAI=getField('ENTRY');
    const slAI=getField('STOP_LOSS');
    const tpAI=getField('TAKE_PROFIT');

    if(fieldsEl&&(entryAI||slAI||tpAI)){
      fieldsEl.style.display='grid';
      const eEl=document.getElementById('aiEntry');const sEl=document.getElementById('aiSL');const tEl=document.getElementById('aiTP');
      if(eEl&&entryAI)eEl.textContent=fP(entryAI);
      if(sEl&&slAI)sEl.textContent=fP(slAI);
      if(tEl&&tpAI)tEl.textContent=fP(tpAI);
    }

    toast('✅ xAI Grok amekamilisha uchambuzi wa '+coin.id);
  }catch(e){
    outEl.className='ai-output error';
    // Jaribu fallback kwa Claude AI kama xAI imefeli
    outEl.textContent='⚠ xAI Grok: '+e.message+'\n\n⏳ Inajaribu Claude AI kama backup...';
    await askClaudeAIFallback(coin,sig,d,outEl,fieldsEl);
  }finally{
    btn.disabled=false;
  }
}

// Claude AI kama backup kama xAI imefeli
async function askClaudeAIFallback(coin,sig,d,outEl,fieldsEl){
  try{
    const prompt=`Wewe ni mtaalam wa crypto trading. Changanua ${coin.id}/USDT haraka.
Bei: $${d.price.toFixed(6)}, RSI: ${sig.rsi?sig.rsi.toFixed(1):'N/A'}, ATR: $${sig.atr?sig.atr.toFixed(6):'N/A'}
Signal ya Algorithm: ${sig.type}, Entry: $${sig.entry?sig.entry.toFixed(6):'N/A'}, SL: $${sig.sl?sig.sl.toFixed(6):'N/A'}, TP: $${sig.tp?sig.tp.toFixed(6):'N/A'}

Jibu kwa muundo huu:
SIGNAL: [BUY/SELL/NEUTRAL]
SABABU: [sababu 2 za Kiswahili]
ENTRY: $[nambari]
STOP_LOSS: $[nambari]
TAKE_PROFIT: $[nambari]
HATARI: [CHINI/WASTANI/JUU]
MUHTASARI: [sentensi moja]`;

    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:500,messages:[{role:'user',content:prompt}]})
    });
    if(!resp.ok)throw new Error('Claude HTTP '+resp.status);
    const data=await resp.json();
    const text=(data.content||[]).map(b=>b.type==='text'?b.text:'').join('').trim();
    if(!text)throw new Error('Jibu tupu');
    outEl.className='ai-output';
    outEl.textContent='[Claude AI Backup]\n\n'+text;
    toast('✅ Claude AI (backup) amekamilisha uchambuzi wa '+coin.id);
  }catch(e2){
    outEl.className='ai-output error';
    outEl.textContent='❌ AI zote zimefeli. Jaribu tena baadaye.\n\nxAI: API key lazima iwe na ruhusa ya grok-3-fast\nClaude: Inahitaji claude.ai app';
  }
}

// ═══════════════════════════════════
//  FOREX + GOLD DATA
// ═══════════════════════════════════
const forexCache={};

async function fetchAllForex(){
  // Njia 1: Twelve Data (EUR/USD, GBP/USD, nk.)
  await fetchTwelveDataForex();
  // Njia 2: Finnhub (Gold/Silver)
  await fetchFinnhubGold();
  // Njia 3: Alpha Vantage kwa TZS
  await fetchAlphaVantageTZS();
  updateForexDisplay();
}

async function fetchTwelveDataForex(){
  const pairs=['EUR/USD','GBP/USD','USD/JPY','AUD/USD','USD/CHF','USD/TZS'];
  const symbols=pairs.join(',');
  try{
    const r=await fetch(`https://api.twelvedata.com/price?symbol=${encodeURIComponent(symbols)}&apikey=${KEYS.twelvedata}`,{signal:AbortSignal.timeout(8000)});
    if(!r.ok)return;
    const data=await r.json();
    pairs.forEach(pair=>{
      const key=pair.replace('/','');
      const d=data[pair]||data[key];
      if(d&&d.price){
        forexCache[key]={rate:parseFloat(d.price),chg:null,source:'12Data'};
      }
    });
    // Pia pata XAUUSD kutoka Twelve Data
    await fetchTwelveDataGold();
  }catch(e){}
}

async function fetchTwelveDataGold(){
  try{
    const r=await fetch(`https://api.twelvedata.com/price?symbol=XAU/USD,XAG/USD&apikey=${KEYS.twelvedata}`,{signal:AbortSignal.timeout(8000)});
    if(!r.ok)return;
    const data=await r.json();
    if(data['XAU/USD']?.price){
      forexCache['XAUUSD']={rate:parseFloat(data['XAU/USD'].price),chg:null,source:'12Data'};
      // Update sidebar
      const el=document.getElementById('metal_XAU');if(el)el.textContent='$'+parseFloat(data['XAU/USD'].price).toFixed(2);
    }
    if(data['XAG/USD']?.price){
      forexCache['XAGUSD']={rate:parseFloat(data['XAG/USD'].price),chg:null,source:'12Data'};
      const el=document.getElementById('metal_XAG');if(el)el.textContent='$'+parseFloat(data['XAG/USD'].price).toFixed(2);
    }
  }catch(e){}
}

async function fetchFinnhubGold(){
  // Finnhub: forex rates
  const pairs=[{sym:'OANDA:XAU_USD',key:'XAUUSD'},{sym:'OANDA:EUR_USD',key:'EURUSD'},{sym:'OANDA:GBP_USD',key:'GBPUSD'},{sym:'OANDA:USD_JPY',key:'USDJPY'}];
  for(const pair of pairs){
    if(forexCache[pair.key]?.rate)continue; // tayari ipo
    try{
      const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${pair.sym}&token=${KEYS.finnhub}`,{signal:AbortSignal.timeout(6000)});
      if(!r.ok)continue;
      const data=await r.json();
      if(data.c&&data.c>0){
        const chg=data.pc>0?((data.c-data.pc)/data.pc*100):null;
        forexCache[pair.key]={rate:data.c,chg,high:data.h,low:data.l,source:'Finnhub'};
        if(pair.key==='XAUUSD'){const el=document.getElementById('metal_XAU');if(el)el.textContent='$'+data.c.toFixed(2);}
      }
    }catch(e){}
  }
}

async function fetchAlphaVantageTZS(){
  // TZS kwa Alpha Vantage
  try{
    if(forexCache['USDTZS']?.rate)return;
    const r=await fetch(`https://www.alphavantage.co/query?function=CURRENCY_EXCHANGE_RATE&from_currency=USD&to_currency=TZS&apikey=${KEYS.alphavantage}`,{signal:AbortSignal.timeout(8000)});
    if(!r.ok)return;
    const data=await r.json();
    const rate=parseFloat(data['Realtime Currency Exchange Rate']?.['5. Exchange Rate']);
    if(rate>0)forexCache['USDTZS']={rate,chg:null,source:'AlphaVantage'};
  }catch(e){}
}

function updateForexDisplay(){
  const pairs=[
    {key:'XAUUSD',id:'fx_XAUUSD',chgId:'fxc_XAUUSD',decimals:2,prefix:'$'},
    {key:'XAGUSD',id:'fx_XAGUSD',chgId:'fxc_XAGUSD',decimals:2,prefix:'$'},
    {key:'EURUSD',id:'fx_EURUSD',chgId:'fxc_EURUSD',decimals:5,prefix:''},
    {key:'GBPUSD',id:'fx_GBPUSD',chgId:'fxc_GBPUSD',decimals:5,prefix:''},
    {key:'USDJPY',id:'fx_USDJPY',chgId:'fxc_USDJPY',decimals:3,prefix:''},
    {key:'USDTZS',id:'fx_USDTZS',chgId:'fxc_USDTZS',decimals:0,prefix:''},
    {key:'AUDUSD',id:'fx_AUDUSD',chgId:'fxc_AUDUSD',decimals:5,prefix:''},
    {key:'USDCHF',id:'fx_USDCHF',chgId:'fxc_USDCHF',decimals:5,prefix:''},
  ];
  pairs.forEach(p=>{
    const el=document.getElementById(p.id);const chgEl=document.getElementById(p.chgId);
    const cache=forexCache[p.key];
    if(el&&cache?.rate){
      el.textContent=p.prefix+cache.rate.toFixed(p.decimals);
      if(chgEl){
        if(cache.chg!==null&&cache.chg!==undefined){
          const pct=(cache.chg>=0?'+':'')+cache.chg.toFixed(2)+'%';
          chgEl.textContent=pct+' | '+cache.source;
          chgEl.style.color=cache.chg>=0?'var(--buy)':'var(--sell)';
        }else{chgEl.textContent=cache.source;chgEl.style.color='var(--muted)';}
      }
    }
    // Sidebar update
    const sbMap={EURUSD:'forex_EURUSD',GBPUSD:'forex_GBPUSD',USDJPY:'forex_USDJPY'};
    if(sbMap[p.key]&&cache?.rate){
      const sbEl=document.getElementById(sbMap[p.key]);
      if(sbEl)sbEl.textContent=cache.rate.toFixed(p.decimals);
    }
  });
}

// ═══════════════════════════════════
//  METAL PRICES (backup/supplement)
// ═══════════════════════════════════
async function fetchMetalPrices(){
  try{
    const r=await fetch(`https://api.metalpriceapi.com/v1/latest?api_key=${KEYS.metal}&base=USD&currencies=XAU,XAG`,{signal:AbortSignal.timeout(8000)});
    if(!r.ok)return;
    const data=await r.json();
    if(!data.success)return;
    const rates=data.rates;
    if(rates['USDXAU']&&!forexCache['XAUUSD']?.rate){
      const gold=1/rates['USDXAU'];
      forexCache['XAUUSD']={rate:gold,chg:null,source:'MetalAPI'};
      const el=document.getElementById('metal_XAU');if(el){el.textContent='$'+gold.toFixed(2);el.style.color='var(--warn)';}
      updateForexDisplay();
    }
    if(rates['USDXAG']&&!forexCache['XAGUSD']?.rate){
      const silver=1/rates['USDXAG'];
      forexCache['XAGUSD']={rate:silver,chg:null,source:'MetalAPI'};
      const el=document.getElementById('metal_XAG');if(el){el.textContent='$'+silver.toFixed(2);el.style.color='var(--muted)';}
      updateForexDisplay();
    }
  }catch(e){}
}

// ═══════════════════════════════════

// ═══════════════════════════════════
function buildSidebar(){
  const list=document.getElementById('coinList');if(!list)return;
  const frag=document.createDocumentFragment();
  COINS.forEach(coin=>{
    const d=S.prices[coin.id],sig=S.signals[coin.id];
    const dotColor=sig?(sig.type==='BUY'?'var(--buy)':sig.type==='SELL'?'var(--sell)':'var(--warn)'):'var(--dim)';
    const pClass=d?(d.chg24h>=0?'up':'dn'):'';
    const btn=document.createElement('button');
    btn.className='coin-btn'+(S.selected.id===coin.id?' active':'');
    btn.onclick=()=>selectCoin(coin.id);
    btn.innerHTML=`<span style="font-size:14px">${coin.em}</span><span class="coin-sym">${coin.id}</span><span class="coin-price-sb ${pClass}" id="sbp_${coin.id}">${d?fP(d.price):'—'}</span><span class="sig-dot" style="background:${dotColor}"></span>`;
    frag.appendChild(btn);
  });
  list.replaceChildren(frag);
  // Update TF buttons
  document.querySelectorAll('.tf-btn').forEach(b=>{b.classList.toggle('active',b.textContent===S.tf);});
}

function flashSidebarPrice(sym){
  const el=document.getElementById('sbp_'+sym);if(!el)return;
  const d=S.prices[sym];if(!d)return;
  el.textContent=fP(d.price);el.className='coin-price-sb '+(d.chg24h>=0?'up':'dn');
}

//  OVERVIEW TABLE
// ═══════════════════════════════════
function showAll(){
  S.view='all';
  const rows=COINS.map(coin=>{
    const d=S.prices[coin.id],sig=S.signals[coin.id];
    if(!d||!sig)return '';
    const p=d.chg24h>=0?'up-txt':'dn-txt';
    const sc=sig.type==='BUY'?'td-buy':sig.type==='SELL'?'td-sell':'td-neut';
    const oc=sig.type==='BUY'?'ord-buy':sig.type==='SELL'?'ord-sell':'ord-neut';
    const cc=sig.conf>=70?'var(--buy)':sig.conf<=50?'var(--sell)':'var(--warn)';
    const arrow=sig.type==='BUY'?'▲':sig.type==='SELL'?'▼':'→';
    return `<tr onclick="selectCoin('${coin.id}')"><td><div class="ov-coin"><span class="ov-em">${coin.em}</span><div><div class="ov-sym2">${coin.id}</div><div class="ov-full2">${coin.name}</div></div></div></td><td id="ovp_${coin.id}">${fP(d.price)}</td><td class="${p}">${fPct(d.chg24h)}</td><td class="${sc}">${arrow} ${sig.type}</td><td><span class="ord-tag ${oc}">${sig.orderType}</span></td><td>${fP(sig.entry)}</td><td style="color:var(--sell)">${fP(sig.sl)}</td><td style="color:var(--buy)">${fP(sig.tp)}</td><td>1:${sig.rr}</td><td style="color:${cc}">${sig.conf}%</td><td class="${sig.trend==='BULLISH'?'up-txt':sig.trend==='BEARISH'?'dn-txt':''}">${sig.trend}</td></tr>`;
  }).join('');
  document.getElementById('mainArea').innerHTML=`
    <div class="disclaimer"><strong>⚠ Tahadhari:</strong> Signals zinatokana na data halisi za Binance. Si ushauri wa uwekezaji.</div>
    <div class="ov-panel">
      <div class="ov-hdr"><span class="ov-title">📊 Muhtasari — Coins Zote (${COINS.length}) · Binance Live</span><span style="font-family:var(--mono);font-size:10px;color:var(--muted)">Bonyeza coin kuona details</span></div>
      <div style="overflow-x:auto"><table class="ov-table">
        <thead><tr><th>Coin</th><th>Bei</th><th>24h%</th><th>Signal</th><th>Order</th><th>Entry</th><th>SL</th><th>TP</th><th>R:R</th><th>Uhakika</th><th>Trend</th></tr></thead>
        <tbody id="ovBody">${rows||'<tr><td colspan="11" style="text-align:center;padding:30px;color:var(--muted)">Inapakia...</td></tr>'}</tbody>
      </table></div>
    </div>`;
  const ovTimer=setInterval(()=>{
    if(S.view!=='all'){clearInterval(ovTimer);return;}
    COINS.forEach(c=>{const el=document.getElementById('ovp_'+c.id);if(el&&S.prices[c.id])el.textContent=fP(S.prices[c.id].price);});
  },1000);
}

function selectCoin(id){
  const coin=COINS.find(c=>c.id===id);if(!coin)return;
  S.selected=coin;S.view='single';
  localStorage.setItem('st_selected',id); // PERSIST
  buildSidebar();renderSingle(coin);fetchKlines(coin,S.tf);connectKlineWS(coin,S.tf);
}

function setTF(btn,tf){
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  S.tf=tf;
  localStorage.setItem('st_tf',tf); // PERSIST
  fetchKlines(S.selected,tf);connectKlineWS(S.selected,tf);
}

// ═══════════════════════════════════
//  TOAST
// ═══════════════════════════════════
function toast(msg,isErr=false){
  const tc=document.getElementById('toasts');if(!tc)return;
  const el=document.createElement('div');el.className='toast';
  if(isErr)el.style.borderColor='rgba(232,51,74,0.4)';
  el.textContent=msg;tc.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity 0.3s';setTimeout(()=>el.remove(),300);},4000);
}
