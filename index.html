<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SadeTrade — Crypto Signal Terminal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');

:root {
  --bg:      #080c14;
  --bg2:     #0d1424;
  --panel:   #111d35;
  --panel2:  #162040;
  --border:  #1e3060;
  --border2: #243870;
  --buy:     #00e5a0;
  --sell:    #ff3d5a;
  --neutral: #6b8cff;
  --warn:    #ffb020;
  --text:    #cdd8f0;
  --muted:   #4a6080;
  --dim:     #2a3f65;
  --white:   #f0f4ff;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ══ HEADER ══ */
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
}

.brand {
  font-family: var(--mono);
  font-weight: 700;
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 10px;
  letter-spacing: 1px;
}

.brand-mark {
  background: linear-gradient(135deg, #00e5a0, #6b8cff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header-center {
  display: flex;
  align-items: center;
  gap: 16px;
}

.market-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(0,229,160,0.07);
  border: 1px solid rgba(0,229,160,0.2);
  border-radius: 6px;
  padding: 4px 12px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--buy);
}

.blink { animation: blink 1.2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.dot { width:7px; height:7px; border-radius:50%; background:var(--buy); }

.header-right { display:flex; gap:10px; align-items:center; }

.refresh-info {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
}

.btn-refresh {
  background: var(--panel2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text);
  padding: 5px 14px;
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-refresh:hover { border-color: var(--buy); color: var(--buy); }
.btn-refresh.spinning { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ══ LAYOUT ══ */
.layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  min-height: calc(100vh - 52px);
}

/* ══ SIDEBAR ══ */
.sidebar {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 16px 12px;
  overflow-y: auto;
  position: sticky;
  top: 52px;
  height: calc(100vh - 52px);
}

.sb-section { margin-bottom: 20px; }

.sb-label {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 0 6px;
  margin-bottom: 8px;
}

.coin-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 8px 10px;
  border-radius: 7px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 3px;
  font-family: var(--sans);
  font-size: 13px;
  text-align: left;
}
.coin-btn:hover { background: var(--panel); border-color: var(--border); }
.coin-btn.active { background: var(--panel2); border-color: var(--border2); color: var(--white); }
.coin-btn .coin-icon { font-size: 16px; width: 24px; text-align:center; }
.coin-btn .coin-name { flex:1; font-weight:500; }
.coin-btn .coin-price-mini {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
}
.coin-btn .coin-signal-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.timeframe-row { display:flex; gap:4px; flex-wrap:wrap; }
.tf-btn {
  flex:1;
  padding: 5px 4px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  min-width: 30px;
}
.tf-btn:hover { color: var(--text); border-color: var(--border2); }
.tf-btn.active { background: var(--panel2); border-color: var(--neutral); color: var(--neutral); }

.watchlist-all-btn {
  width: 100%;
  padding: 7px;
  border-radius: 6px;
  border: 1px dashed var(--border2);
  background: transparent;
  color: var(--neutral);
  font-family: var(--mono);
  font-size: 10px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 6px;
}
.watchlist-all-btn:hover { background: rgba(107,140,255,0.08); }

/* ══ MAIN ══ */
.main { padding: 16px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }

/* ══ COIN HEADER BLOCK ══ */
.coin-header {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.coin-title {
  display: flex;
  align-items: center;
  gap: 12px;
}
.coin-emoji { font-size: 28px; }
.coin-name-block .sym {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
}
.coin-name-block .full { font-size: 11px; color: var(--muted); margin-top:1px; }

.live-price-block { text-align:right; }
.live-price {
  font-family: var(--mono);
  font-size: 26px;
  font-weight: 700;
  color: var(--white);
}
.price-change {
  font-family: var(--mono);
  font-size: 12px;
  margin-top: 2px;
}
.price-change.up { color: var(--buy); }
.price-change.dn { color: var(--sell); }

.coin-meta {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}
.meta-item { text-align:center; }
.meta-label { font-size: 9px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }
.meta-val { font-family:var(--mono); font-size:12px; font-weight:600; color:var(--text); margin-top:3px; }

/* ══ SIGNAL CARD ══ */
.signal-card {
  border-radius: 10px;
  border: 1px solid var(--border);
  overflow: hidden;
}

.signal-card-header {
  padding: 12px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}
.signal-card-header.buy-bg { background: rgba(0,229,160,0.07); border-bottom: 1px solid rgba(0,229,160,0.15); }
.signal-card-header.sell-bg { background: rgba(255,61,90,0.07); border-bottom: 1px solid rgba(255,61,90,0.15); }
.signal-card-header.neutral-bg { background: rgba(107,140,255,0.07); border-bottom: 1px solid rgba(107,140,255,0.15); }

.signal-type-tag {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.signal-type-tag.buy { color: var(--buy); }
.signal-type-tag.sell { color: var(--sell); }
.signal-type-tag.neutral { color: var(--neutral); }

.signal-badges { display:flex; gap:6px; flex-wrap:wrap; }

.badge {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: 0.5px;
}
.badge-order-buy { background: rgba(0,229,160,0.12); color: var(--buy); border: 1px solid rgba(0,229,160,0.3); }
.badge-order-sell { background: rgba(255,61,90,0.12); color: var(--sell); border: 1px solid rgba(255,61,90,0.3); }
.badge-neutral { background: rgba(107,140,255,0.12); color: var(--neutral); border: 1px solid rgba(107,140,255,0.3); }
.badge-trend-bull { background: rgba(0,229,160,0.08); color: var(--buy); border: 1px solid rgba(0,229,160,0.2); }
.badge-trend-bear { background: rgba(255,61,90,0.08); color: var(--sell); border: 1px solid rgba(255,61,90,0.2); }
.badge-trend-side { background: rgba(255,176,32,0.08); color: var(--warn); border: 1px solid rgba(255,176,32,0.2); }
.badge-conf { background: rgba(255,176,32,0.08); color: var(--warn); border: 1px solid rgba(255,176,32,0.2); }
.badge-conf.high { background: rgba(0,229,160,0.08); color: var(--buy); border-color: rgba(0,229,160,0.2); }
.badge-conf.low { background: rgba(255,61,90,0.08); color: var(--sell); border-color: rgba(255,61,90,0.2); }

.signal-body { background: var(--panel); padding: 16px 18px; }

.signal-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 14px;
}

.sig-cell {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
}
.sig-cell-label { font-size: 9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:5px; }
.sig-cell-val { font-family:var(--mono); font-size:14px; font-weight:700; color:var(--white); }
.sig-cell-val.entry { color: var(--neutral); }
.sig-cell-val.sl { color: var(--sell); }
.sig-cell-val.tp { color: var(--buy); }
.sig-cell-val.rr { color: var(--warn); }
.sig-cell-sub { font-size:10px; color:var(--muted); margin-top:3px; font-family:var(--mono); }

/* ══ CONFIDENCE BAR ══ */
.conf-row { margin-bottom: 14px; }
.conf-label-row { display:flex; justify-content:space-between; margin-bottom:5px; }
.conf-label { font-size:10px; color:var(--muted); }
.conf-pct { font-family:var(--mono); font-size:12px; font-weight:700; }
.conf-bar-track {
  height: 6px;
  background: var(--panel2);
  border-radius: 3px;
  overflow: hidden;
}
.conf-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s ease;
}

/* ══ SIGNAL REASON ══ */
.signal-reason {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-left: 3px solid;
  border-radius: 0 8px 8px 0;
  padding: 12px 14px;
  margin-bottom: 14px;
}
.signal-reason.buy { border-left-color: var(--buy); }
.signal-reason.sell { border-left-color: var(--sell); }
.signal-reason.neutral { border-left-color: var(--neutral); }
.reason-title { font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:6px; }
.reason-text { font-size:12px; color:var(--text); line-height:1.7; }
.reason-points { list-style:none; margin-top:6px; }
.reason-points li { font-size:11px; color:var(--text); padding:2px 0; }
.reason-points li::before { content:'→ '; color:var(--muted); }

/* ══ INDICATORS ROW ══ */
.indicators-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.ind-cell {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 8px 10px;
  text-align:center;
}
.ind-name { font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:4px; }
.ind-val { font-family:var(--mono); font-size:12px; font-weight:700; }
.ind-val.bull { color:var(--buy); }
.ind-val.bear { color:var(--sell); }
.ind-val.neut { color:var(--warn); }

/* ══ CHART ══ */
.chart-panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
}
.chart-panel-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.chart-title { font-size:12px; font-weight:600; color:var(--text); }
canvas { display:block; }

/* ══ MULTI OVERVIEW TABLE ══ */
.overview-panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.overview-header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.overview-title { font-size:12px; font-weight:600; }
.overview-table { width:100%; border-collapse:collapse; }
.overview-table th {
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  padding: 8px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.overview-table td {
  padding: 10px 14px;
  font-family: var(--mono);
  font-size: 11px;
  border-bottom: 1px solid rgba(30,48,96,0.4);
  white-space: nowrap;
}
.overview-table tbody tr { cursor:pointer; transition:background 0.15s; }
.overview-table tbody tr:hover td { background: rgba(255,255,255,0.02); }
.overview-table tbody tr:last-child td { border-bottom: none; }

.ov-coin { display:flex; align-items:center; gap:8px; }
.ov-em { font-size:15px; }
.ov-sym { font-weight:700; color:var(--white); }
.ov-full { font-size:10px; color:var(--muted); font-family:var(--sans); }
td.buy-sig { color:var(--buy); font-weight:700; }
td.sell-sig { color:var(--sell); font-weight:700; }
td.neut-sig { color:var(--warn); font-weight:700; }
.up-txt { color:var(--buy); }
.dn-txt { color:var(--sell); }
.order-tag {
  display:inline-block;
  padding:2px 7px;
  border-radius:4px;
  font-size:9px;
  font-weight:700;
  letter-spacing:0.5px;
}
.order-tag.buy { background:rgba(0,229,160,0.12); color:var(--buy); }
.order-tag.sell { background:rgba(255,61,90,0.12); color:var(--sell); }
.order-tag.neut { background:rgba(107,140,255,0.12); color:var(--neutral); }

/* ══ LOADING / ERROR ══ */
.loading-overlay {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
  padding:40px;
}
.spinner {
  width:36px; height:36px;
  border: 3px solid var(--border);
  border-top-color: var(--buy);
  border-radius:50%;
  animation: spin 0.8s linear infinite;
}
.loading-text { font-family:var(--mono); font-size:12px; color:var(--muted); }

.error-box {
  background:rgba(255,61,90,0.06);
  border:1px solid rgba(255,61,90,0.2);
  border-radius:8px;
  padding:14px;
  font-size:12px;
  color:var(--sell);
  font-family:var(--mono);
}

/* ══ TOAST ══ */
#toasts { position:fixed; bottom:20px; right:20px; z-index:999; display:flex; flex-direction:column; gap:6px; }
.toast {
  background:var(--panel2);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:10px 14px;
  font-family:var(--mono);
  font-size:11px;
  color:var(--text);
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  animation: slideUp 0.25s ease;
  max-width:280px;
}
@keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

/* ══ COUNTDOWN ══ */
.countdown { font-family:var(--mono); font-size:10px; color:var(--muted); }

/* ══ DISCLAIMER ══ */
.disclaimer {
  background: rgba(255,176,32,0.05);
  border: 1px solid rgba(255,176,32,0.15);
  border-radius:8px;
  padding:10px 14px;
  font-size:11px;
  color:var(--muted);
  line-height:1.6;
}
.disclaimer strong { color:var(--warn); }

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:var(--bg2); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* ══ RESPONSIVE ══ */
@media (max-width:900px) {
  .layout { grid-template-columns:1fr; }
  .sidebar { position:static; height:auto; display:flex; flex-wrap:wrap; gap:10px; padding:12px; }
  .sb-section { margin-bottom:0; min-width:140px; }
  .signal-grid { grid-template-columns: repeat(2,1fr); }
  .indicators-row { grid-template-columns: repeat(3,1fr); }
}
@media (max-width:600px) {
  .signal-grid { grid-template-columns: 1fr 1fr; }
  .indicators-row { grid-template-columns: repeat(2,1fr); }
  .coin-meta { gap:10px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="brand">
    ⚡ Sade<span class="brand-mark">Trade</span>
    <span style="color:var(--muted);font-size:10px;font-weight:400;margin-left:4px;">SIGNAL TERMINAL</span>
  </div>
  <div class="header-center">
    <div class="market-pill">
      <div class="dot blink"></div>
      DATA: CoinGecko API
    </div>
    <span class="countdown" id="countdownEl">Inasasisha hivi karibuni...</span>
  </div>
  <div class="header-right">
    <span class="refresh-info" id="lastUpdateEl">—</span>
    <button class="btn-refresh" id="refreshBtn" onclick="refreshAll()">↻ Sasisha</button>
  </div>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-section">
      <div class="sb-label">Coins</div>
      <div id="coinList"></div>
      <button class="watchlist-all-btn" onclick="showAllOverview()">☰ Angalia Zote</button>
    </div>
    <div class="sb-section">
      <div class="sb-label">Muda</div>
      <div class="timeframe-row" id="tfRow">
        <button class="tf-btn active" data-tf="1" onclick="setTF(this,1)">1h</button>
        <button class="tf-btn" data-tf="4" onclick="setTF(this,4)">4h</button>
        <button class="tf-btn" data-tf="24" onclick="setTF(this,24)">1D</button>
        <button class="tf-btn" data-tf="168" onclick="setTF(this,168)">1W</button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainArea">
    <div class="loading-overlay">
      <div class="spinner"></div>
      <div class="loading-text">Inapakia data za soko halisi...</div>
    </div>
  </main>

</div>

<div id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>

// ════════════════════════════════════════
//  COIN DEFINITIONS
// ════════════════════════════════════════
const COINS = [
  { id:'bitcoin',       sym:'BTC', name:'Bitcoin',       em:'₿',  cg:'bitcoin' },
  { id:'ethereum',      sym:'ETH', name:'Ethereum',      em:'Ξ',  cg:'ethereum' },
  { id:'solana',        sym:'SOL', name:'Solana',        em:'◎',  cg:'solana' },
  { id:'ripple',        sym:'XRP', name:'XRP',           em:'✕',  cg:'ripple' },
  { id:'binancecoin',   sym:'BNB', name:'BNB',           em:'◈',  cg:'binancecoin' },
  { id:'dogecoin',      sym:'DOGE',name:'Dogecoin',      em:'Ð',  cg:'dogecoin' },
  { id:'cardano',       sym:'ADA', name:'Cardano',       em:'₳',  cg:'cardano' },
  { id:'avalanche-2',   sym:'AVAX',name:'Avalanche',     em:'▲',  cg:'avalanche-2' },
  { id:'polkadot',      sym:'DOT', name:'Polkadot',      em:'●',  cg:'polkadot' },
  { id:'chainlink',     sym:'LINK',name:'Chainlink',     em:'⬡',  cg:'chainlink' },
  { id:'tron',          sym:'TRX', name:'TRON',          em:'⬟',  cg:'tron' },
  { id:'shiba-inu',     sym:'SHIB',name:'Shiba Inu',     em:'🐕', cg:'shiba-inu' },
];

// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
let state = {
  selectedCoin: COINS[0],
  timeframe: 1,
  marketData: {},      // { id: {price, change24h, high24h, low24h, vol, mcap, history:[]} }
  chartInstance: null,
  signals: {},         // { id: signalObj }
  loading: false,
  countdownSec: 60,
  countdownTimer: null,
  autoRefreshTimer: null,
  viewMode: 'single',  // 'single' | 'all'
};

// ════════════════════════════════════════
//  FORMAT HELPERS
// ════════════════════════════════════════
function fmtPrice(p) {
  if (!p && p !== 0) return '—';
  if (p >= 1000)    return '$' + p.toLocaleString('en-US',{maximumFractionDigits:2});
  if (p >= 1)       return '$' + p.toFixed(4);
  if (p >= 0.001)   return '$' + p.toFixed(6);
  return '$' + p.toFixed(8);
}
function fmtPct(p)   { return (p >= 0 ? '+':'')+p.toFixed(2)+'%'; }
function fmtVol(v)   {
  if (v >= 1e9) return '$'+(v/1e9).toFixed(2)+'B';
  if (v >= 1e6) return '$'+(v/1e6).toFixed(2)+'M';
  return '$'+v.toLocaleString();
}
function now() { return new Date().toLocaleTimeString('sw-TZ',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }

async function fetchMarketData() {
  const ids = COINS.map(c => c.cg).join(',');
  const url = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&per_page=20&page=1&sparkline=false&price_change_percentage=24h`;

  return await res.json();
}

async function fetchHistory(coinId, hours) {
  const days = hours >= 168 ? 7 : hours >= 24 ? 1 : 1;
  const url = `https://api.coingecko.com/api/v3/coins/${coinId}/market_chart?vs_currency=usd&days=${days}&interval=${hours <= 4 ? 'minutely' : 'hourly'}`;
  const res = await fetch(url, { headers:{ 'Accept':'application/json' } });
  if (!res.ok) return null;
  const d = await res.json();
  return d.prices || null;
}

// ════════════════════════════════════════
//  TECHNICAL ANALYSIS ENGINE
// ════════════════════════════════════════
function calcSMA(arr, n) {
  if (arr.length < n) return null;
  return arr.slice(-n).reduce((a,b)=>a+b,0)/n;
}

function calcEMA(arr, n) {
  if (arr.length < n) return null;
  const k = 2/(n+1);
  let ema = arr.slice(0,n).reduce((a,b)=>a+b,0)/n;
  for (let i=n;i<arr.length;i++) ema = arr[i]*k + ema*(1-k);
  return ema;
}

function calcRSI(prices, period=14) {
  if (prices.length < period+1) return 50;
  let gains=0, losses=0;
  for (let i=prices.length-period;i<prices.length;i++) {
    const d=prices[i]-prices[i-1];
    if(d>0) gains+=d; else losses+=Math.abs(d);
  }
  const avgG=gains/period, avgL=losses/period;
  if(avgL===0) return 100;
  const rs=avgG/avgL;
  return 100-(100/(1+rs));
}

function calcBB(prices, n=20, mult=2) {
  if (prices.length < n) return null;
  const slice = prices.slice(-n);
  const mean = slice.reduce((a,b)=>a+b,0)/n;
  const std  = Math.sqrt(slice.reduce((a,b)=>a+(b-mean)**2,0)/n);
  return { upper:mean+mult*std, middle:mean, lower:mean-mult*std, std };
}

function calcMACD(prices) {
  if (prices.length < 26) return null;
  const ema12 = calcEMA(prices,12);
  const ema26 = calcEMA(prices,26);
  if (!ema12||!ema26) return null;
  const macd = ema12-ema26;
  return { macd, signal: macd * 0.9, hist: macd * 0.1 };
}

function calcATR(highs, lows, closes, n=14) {
  if (closes.length < n+1) return closes[closes.length-1]*0.02;
  let trSum=0;
  for (let i=closes.length-n;i<closes.length;i++) {
    const tr=Math.max(highs[i]-lows[i], Math.abs(highs[i]-closes[i-1]), Math.abs(lows[i]-closes[i-1]));
    trSum+=tr;
  }
  return trSum/n;
}

function generateSignal(coin, data, history) {
  if (!history || history.length < 20) {
    return fallbackSignal(coin, data);
  }

  const prices = history.map(h=>h[1]);
  const current = data.price;
  const change24h = data.change24h;

  // Indicators
  const rsi    = calcRSI(prices, 14);
  const sma20  = calcSMA(prices, 20);
  const sma50  = calcSMA(prices, Math.min(50, prices.length));
  const ema12  = calcEMA(prices, Math.min(12, prices.length));
  const ema26  = calcEMA(prices, Math.min(26, prices.length));
  const bb     = calcBB(prices, Math.min(20, prices.length));
  const macd   = calcMACD(prices);
  const atr    = data.price * 0.015; // approx 1.5% as ATR

  // Scoring system
  let bullScore = 0, bearScore = 0;
  const reasons = [];
  const indSignals = {};

  // RSI
  if (rsi < 35) {
    bullScore += 3;
    reasons.push('RSI ya ' + rsi.toFixed(0) + ' — msongo wa kuuza (oversold), uwezekano wa kurudi juu');
    indSignals.rsi = 'bull';
  } else if (rsi > 65) {
    bearScore += 3;
    reasons.push('RSI ya ' + rsi.toFixed(0) + ' — msongo wa kununua (overbought), uwezekano wa kushuka');
    indSignals.rsi = 'bear';
  } else {
    reasons.push('RSI ya ' + rsi.toFixed(0) + ' — katikati ya wastani');
    indSignals.rsi = 'neut';
  }

  // SMA cross
  if (sma20 && sma50) {
    if (sma20 > sma50) {
      bullScore += 2;
      reasons.push('SMA20 iko juu ya SMA50 — mwelekeo wa kupanda (uptrend)');
      indSignals.sma = 'bull';
    } else {
      bearScore += 2;
      reasons.push('SMA20 iko chini ya SMA50 — mwelekeo wa kushuka (downtrend)');
      indSignals.sma = 'bear';
    }
  } else { indSignals.sma = 'neut'; }

  // EMA
  if (ema12 && ema26) {
    if (ema12 > ema26) { bullScore++; indSignals.ema = 'bull'; }
    else { bearScore++; indSignals.ema = 'bear'; }
  } else { indSignals.ema = 'neut'; }

  // Bollinger Bands
  if (bb) {
    if (current < bb.lower) {
      bullScore += 2;
      reasons.push('Bei iko chini ya Bollinger Band ya chini — nafasi ya kununua');
      indSignals.bb = 'bull';
    } else if (current > bb.upper) {
      bearScore += 2;
      reasons.push('Bei iko juu ya Bollinger Band ya juu — hatari ya kushuka');
      indSignals.bb = 'bear';
    } else { indSignals.bb = 'neut'; }
  } else { indSignals.bb = 'neut'; }

  // MACD
  if (macd) {
    if (macd.macd > 0 && macd.hist > 0) {
      bullScore += 2;
      reasons.push('MACD iko juu ya sifuri na inaongezeka — nguvu ya kununua');
      indSignals.macd = 'bull';
    } else if (macd.macd < 0 && macd.hist < 0) {
      bearScore += 2;
      reasons.push('MACD iko chini ya sifuri — nguvu ya kuuza');
      indSignals.macd = 'bear';
    } else { indSignals.macd = 'neut'; }
  } else { indSignals.macd = 'neut'; }

  // Volume/change momentum
  if (change24h > 4) {
    bullScore += 1;
    reasons.push('Mabadiliko ya siku ya ' + fmtPct(change24h) + ' — nguvu ya soko');
  } else if (change24h < -4) {
    bearScore += 1;
    reasons.push('Mabadiliko ya siku ya ' + fmtPct(change24h) + ' — shinikizo la kuuza');
  }

  // Price vs high/low
  const range = data.high24h - data.low24h;
  const posInRange = range > 0 ? (current - data.low24h) / range : 0.5;
  if (posInRange < 0.25) { bullScore += 1; reasons.push('Bei karibu na kiwango cha chini cha siku (support)'); }
  if (posInRange > 0.75) { bearScore += 1; reasons.push('Bei karibu na kiwango cha juu cha siku (resistance)'); }

  // Determine signal
  const total = bullScore + bearScore;
  const confidence = Math.min(95, Math.max(40, Math.round((Math.max(bullScore,bearScore)/Math.max(total,1))*100)));
  const net = bullScore - bearScore;

  let signalType, trend, orderType, slMult, tpMult;

  if (net >= 3) {
    signalType = 'BUY';
    trend = 'BULLISH';
    // Determine order type based on RSI and position
    if (rsi < 35 || posInRange < 0.2) { orderType = 'Buy Market'; }
    else if (posInRange < 0.45)       { orderType = 'Buy Limit'; }
    else                              { orderType = 'Buy Stop'; }
    slMult = 1.5; tpMult = 3.0;
  } else if (net <= -3) {
    signalType = 'SELL';
    trend = 'BEARISH';
    if (rsi > 65 || posInRange > 0.8) { orderType = 'Sell Market'; }
    else if (posInRange > 0.55)       { orderType = 'Sell Limit'; }
    else                              { orderType = 'Sell Stop'; }
    slMult = 1.5; tpMult = 3.0;
  } else {
    signalType = 'NEUTRAL';
    trend = 'SIDEWAYS';
    orderType = 'Subiri — Hakuna Signal';
    slMult = 1.0; tpMult = 2.0;
  }

  // Entry, SL, TP
  const entryPrice = current;
  let slPrice, tpPrice;
  const slDist = atr * slMult;
  const tpDist = atr * tpMult;

  if (signalType === 'BUY') {
    slPrice = entryPrice - slDist;
    tpPrice = entryPrice + tpDist;
  } else if (signalType === 'SELL') {
    slPrice = entryPrice + slDist;
    tpPrice = entryPrice - tpDist;
  } else {
    slPrice = entryPrice - slDist;
    tpPrice = entryPrice + tpDist;
  }

  const rrRatio = (Math.abs(tpDist) / Math.abs(slDist)).toFixed(1);

  return {
    type: signalType,
    trend,
    orderType,
    confidence,
    entry: entryPrice,
    sl: slPrice,
    tp: tpPrice,
    rr: rrRatio,
    rsi, sma20, ema12, ema26,
    bb, macd,
    reasons: reasons.slice(0,5),
    indSignals,
    bullScore,
    bearScore,
  };
}

function fallbackSignal(coin, data) {
  const change = data.change24h;
  const type = change > 2 ? 'BUY' : change < -2 ? 'SELL' : 'NEUTRAL';
  const trend = type === 'BUY' ? 'BULLISH' : type === 'SELL' ? 'BEARISH' : 'SIDEWAYS';
  const orderType = type === 'BUY' ? 'Buy Market' : type === 'SELL' ? 'Sell Market' : 'Subiri — Hakuna Signal';
  const atr = data.price * 0.015;
  const entry = data.price;
  const sl = type === 'BUY' ? entry - atr*1.5 : entry + atr*1.5;
  const tp = type === 'BUY' ? entry + atr*3   : entry - atr*3;
  return {
    type, trend, orderType, confidence: 55,
    entry, sl, tp, rr: '2.0',
    rsi: 50, sma20: entry, ema12: entry, ema26: entry, bb: null, macd: null,
    reasons: ['Uchambuzi wa awali kulingana na mabadiliko ya bei', 'Data za kina zinapakuliwa...'],
    indSignals: { rsi:'neut', sma:'neut', ema:'neut', bb:'neut', macd:'neut' },
    bullScore: 0, bearScore: 0,
  };
}

// ════════════════════════════════════════
//  CHART
// ════════════════════════════════════════
function drawChart(history, sigType, sym) {
  if (state.chartInstance) { state.chartInstance.destroy(); state.chartInstance = null; }
  const canvas = document.getElementById('coinChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  // Sample at most 120 points
  const step = Math.max(1, Math.floor(history.length / 120));
  const sampled = history.filter((_,i) => i % step === 0);

  const labels = sampled.map(h => {
    const d = new Date(h[0]);
    return d.toLocaleTimeString('sw-TZ',{hour:'2-digit',minute:'2-digit'});
  });
  const prices = sampled.map(h => h[1]);
  const color = sigType === 'BUY' ? '#00e5a0' : sigType === 'SELL' ? '#ff3d5a' : '#6b8cff';

  state.chartInstance = new Chart(ctx, {
    type:'line',
    data:{
      labels,
      datasets:[{
        data: prices,
        borderColor: color,
        backgroundColor: color+'18',
        borderWidth: 1.5,
        pointRadius: 0,
        fill: true,
        tension: 0.2,
      }]
    },
    options:{
      responsive:true,
      animation:{ duration:400 },
      plugins:{ legend:{display:false}, tooltip:{
        backgroundColor:'#162040',
        borderColor:'#1e3060',
        borderWidth:1,
        titleColor:'#cdd8f0',
        bodyColor:'#4a6080',
        titleFont:{family:'IBM Plex Mono'},
        bodyFont:{family:'IBM Plex Mono',size:11},
        callbacks:{ label: ctx => ' '+fmtPrice(ctx.parsed.y) }
      }},
      scales:{
        x:{ ticks:{color:'#4a6080',font:{family:'IBM Plex Mono',size:9},maxTicksLimit:10}, grid:{color:'rgba(30,48,96,0.4)'} },
        y:{ ticks:{color:'#4a6080',font:{family:'IBM Plex Mono',size:9}}, grid:{color:'rgba(30,48,96,0.4)'} }
      }
    }
  });
}

        <td style="color:var(--buy)">${fmtPrice(sig.tp)}</td>
        <td>1:${sig.rr}</td>
        <td style="color:${sig.confidence>=70?'var(--buy)':sig.confidence<=50?'var(--sell)':'var(--warn)'}">${sig.confidence}%</td>
        <td class="${sig.trend==='BULLISH'?'up-txt':sig.trend==='BEARISH'?'dn-txt':''}">${sig.trend}</td>
      </tr>`;
  }).join('');

  main.innerHTML = `
    <div class="disclaimer">
      <strong>⚠ Tahadhari:</strong> Signals zinatokana na data halisi + uchambuzi wa kiufundi. Si ushauri wa uwekezaji. Bonyeza safu yoyote kupata uchambuzi wa kina.
    </div>
    <div class="overview-panel">
      <div class="overview-header">
        <span class="overview-title">📊 Muhtasari — Coins Zote (${COINS.length} coins)</span>
        <span style="font-size:10px;color:var(--muted);font-family:var(--mono);">Imesasishwa: ${now()}</span>
      </div>
      <div style="overflow-x:auto">
        <table class="overview-table">
          <thead><tr>
            <th>Coin</th><th>Bei</th><th>24h</th><th>Signal</th>
            <th>Order</th><th>Entry</th><th>SL</th><th>TP</th>
            <th>R:R</th><th>Uhakika</th><th>Trend</th>
          </tr></thead>
          <tbody>${rows || '<tr><td colspan="11" style="text-align:center;padding:30px;color:var(--muted)">Inapakia data...</td></tr>'}</tbody>
        </table>
      </div>
    </div>
  `;
}

// ════════════════════════════════════════
//  MAIN REFRESH
// ════════════════════════════════════════
async function refreshAll() {
  if (state.loading) return;
  state.loading = true;
  const btn = document.getElementById('refreshBtn');
  btn.textContent = '↻ Inapakia...';
  btn.style.opacity = '0.7';

  try {
    const markets = await fetchMarketData();
    markets.forEach(m => {
      const coin = COINS.find(c => c.cg === m.id);
      if (!coin) return;
      const prev = state.marketData[coin.id];
      state.marketData[coin.id] = {
        price:    m.current_price,
        change24h: m.price_change_percentage_24h || 0,
        high24h:  m.high_24h,
        low24h:   m.low_24h,
        vol:      m.total_volume,
        mcap:     m.market_cap,
        history:  prev ? prev.history : null,
      };
    });

    // Fetch history for selected coin
    const sc = state.selectedCoin;
    if (state.marketData[sc.id]) {
      const hist = await fetchHistory(sc.cg, state.timeframe);
      state.marketData[sc.id].history = hist;
      // Pre-generate signals for all coins (using price-only fast method)
      COINS.forEach(coin => {
        const d = state.marketData[coin.id];
        if (d) state.signals[coin.id] = generateSignal(coin, d, d.history);
      });
    }

    document.getElementById('lastUpdateEl').textContent = now();
    buildSidebar();

    if (state.viewMode === 'single') renderSingleView(state.selectedCoin);
    else showAllOverview();

    toast('✅ Imesasishwa — ' + now());
    resetCountdown();

  } catch(err) {
    console.error(err);
    toast('⚠ Hitilafu: ' + err.message, true);
    const main = document.getElementById('mainArea');
    if (main.children.length <= 1) {
      main.innerHTML = `<div class="error-box">❌ Hitilafu ya API: ${err.message}<br><br>CoinGecko inaweza kuwa na mzigo mkubwa. Jaribu tena baada ya sekunde 30.<br><br>Rate limit: CoinGecko API ya bure inaruhusu maombi 10-30/dakika.</div>`;
    }
  }

  state.loading = false;
  btn.textContent = '↻ Sasisha';
  btn.style.opacity = '1';
}

// ════════════════════════════════════════
//  COUNTDOWN
// ════════════════════════════════════════
function resetCountdown() {
  clearInterval(state.countdownTimer);
  clearTimeout(state.autoRefreshTimer);
  state.countdownSec = 60;
  state.countdownTimer = setInterval(() => {
    state.countdownSec--;
    const el = document.getElementById('countdownEl');
    if (el) el.textContent = `Inasasisha kwa ${state.countdownSec}s`;
    if (state.countdownSec <= 0) clearInterval(state.countdownTimer);
  }, 1000);
  state.autoRefreshTimer = setTimeout(() => refreshAll(), 60000);
}

// ════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════
function toast(msg, isErr=false) {
  const tc = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast';
  if (isErr) el.style.borderColor = 'rgba(255,61,90,0.4)';
  el.textContent = msg;
  tc.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity 0.3s'; setTimeout(()=>el.remove(),300); }, 4500);
}

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  buildSidebar();
  refreshAll();
});
</script>
</body>
</html>
