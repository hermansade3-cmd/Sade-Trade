<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SadeTrade — Crypto Signal Terminal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');

:root {
  --bg:      #080c14;
  --bg2:     #0d1424;
  --panel:   #111d35;
  --panel2:  #162040;
  --border:  #1e3060;
  --border2: #243870;
  --buy:     #00e5a0;
  --sell:    #ff3d5a;
  --neutral: #6b8cff;
  --warn:    #ffb020;
  --text:    #cdd8f0;
  --muted:   #4a6080;
  --dim:     #2a3f65;
  --white:   #f0f4ff;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); font-size:13px; min-height:100vh; overflow-x:hidden; }

/* HEADER */
.header {
  background:var(--bg2); border-bottom:1px solid var(--border);
  padding:0 16px; height:52px; display:flex; align-items:center;
  justify-content:space-between; position:sticky; top:0; z-index:200;
}
.brand { font-family:var(--mono); font-weight:700; font-size:15px; display:flex; align-items:center; gap:8px; }
.brand-mark { background:linear-gradient(135deg,#00e5a0,#6b8cff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.ws-pill {
  display:flex; align-items:center; gap:6px;
  background:rgba(0,229,160,0.07); border:1px solid rgba(0,229,160,0.2);
  border-radius:6px; padding:4px 12px; font-family:var(--mono); font-size:11px; color:var(--buy);
}
.dot { width:7px; height:7px; border-radius:50%; background:var(--buy); }
.blink { animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.tick-counter {
  font-family:var(--mono); font-size:11px; color:var(--muted);
  background:var(--panel); border:1px solid var(--border); border-radius:5px; padding:3px 10px;
}
.tick-counter span { color:var(--buy); font-weight:700; }
.hdr-right { display:flex; align-items:center; gap:10px; }
.last-update { font-family:var(--mono); font-size:10px; color:var(--muted); }

/* LAYOUT */
.layout { display:grid; grid-template-columns:200px 1fr; min-height:calc(100vh - 52px); }

/* SIDEBAR */
.sidebar {
  background:var(--bg2); border-right:1px solid var(--border);
  padding:12px 8px; overflow-y:auto; position:sticky; top:52px; height:calc(100vh - 52px);
}
.sb-label { font-family:var(--mono); font-size:9px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--muted); padding:0 6px; margin-bottom:8px; }
.coin-btn {
  display:flex; align-items:center; gap:7px; width:100%; padding:7px 8px;
  border-radius:7px; border:1px solid transparent; background:transparent;
  color:var(--text); cursor:pointer; transition:all 0.12s; margin-bottom:2px;
  font-family:var(--sans); font-size:12px; text-align:left;
}
.coin-btn:hover { background:var(--panel); border-color:var(--border); }
.coin-btn.active { background:var(--panel2); border-color:var(--border2); color:var(--white); }
.coin-sym { font-weight:700; font-size:12px; flex:1; }
.coin-price-sb { font-family:var(--mono); font-size:10px; transition:color 0.3s; }
.coin-price-sb.flash-up { color:var(--buy) !important; }
.coin-price-sb.flash-dn { color:var(--sell) !important; }
.sig-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

.sb-divider { border:none; border-top:1px solid var(--border); margin:10px 0; }

.tf-row { display:flex; gap:4px; flex-wrap:wrap; padding:0 4px; }
.tf-btn {
  flex:1; padding:5px 3px; border-radius:5px; border:1px solid var(--border);
  background:transparent; color:var(--muted); font-family:var(--mono); font-size:10px;
  font-weight:600; cursor:pointer; transition:all 0.12s; text-align:center; min-width:28px;
}
.tf-btn:hover { color:var(--text); border-color:var(--border2); }
.tf-btn.active { background:var(--panel2); border-color:var(--neutral); color:var(--neutral); }

.btn-all {
  width:100%; margin-top:8px; padding:7px; border-radius:6px;
  border:1px dashed var(--border2); background:transparent; color:var(--neutral);
  font-family:var(--mono); font-size:10px; cursor:pointer; transition:all 0.2s;
}
.btn-all:hover { background:rgba(107,140,255,0.08); }

/* MAIN */
.main { padding:14px; display:flex; flex-direction:column; gap:12px; overflow-y:auto; }

/* COIN HEADER */
.coin-header {
  background:var(--panel); border:1px solid var(--border); border-radius:10px;
  padding:14px 18px; display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;
}
.coin-title { display:flex; align-items:center; gap:10px; }
.coin-em { font-size:26px; }
.coin-sym-big { font-family:var(--mono); font-size:20px; font-weight:700; color:var(--white); }
.coin-fullname { font-size:10px; color:var(--muted); }
.live-price-wrap { text-align:right; }
.live-price {
  font-family:var(--mono); font-size:28px; font-weight:700; color:var(--white);
  transition:color 0.4s;
}
.live-price.flash-up { color:var(--buy) !important; }
.live-price.flash-dn { color:var(--sell) !important; }
.price-chg { font-family:var(--mono); font-size:12px; margin-top:2px; }
.up { color:var(--buy); } .dn { color:var(--sell); }
.meta-row { display:flex; gap:14px; flex-wrap:wrap; }
.meta-item { text-align:center; }
.meta-lbl { font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }
.meta-val { font-family:var(--mono); font-size:11px; font-weight:600; color:var(--text); margin-top:2px; }

/* SIGNAL CARD */
.sig-card { background:var(--panel); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.sig-head { padding:12px 16px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
.sig-head.buy-bg  { background:rgba(0,229,160,0.07); border-bottom:1px solid rgba(0,229,160,0.15); }
.sig-head.sell-bg { background:rgba(255,61,90,0.07);  border-bottom:1px solid rgba(255,61,90,0.15); }
.sig-head.neut-bg { background:rgba(107,140,255,0.07);border-bottom:1px solid rgba(107,140,255,0.15); }
.sig-type { font-family:var(--mono); font-size:22px; font-weight:700; display:flex; align-items:center; gap:7px; }
.sig-type.buy{color:var(--buy);} .sig-type.sell{color:var(--sell);} .sig-type.neut{color:var(--neutral);}
.badges { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
.badge { font-family:var(--mono); font-size:10px; font-weight:600; padding:3px 9px; border-radius:20px; }
.b-buy  { background:rgba(0,229,160,0.12); color:var(--buy);  border:1px solid rgba(0,229,160,0.3); }
.b-sell { background:rgba(255,61,90,0.12);  color:var(--sell); border:1px solid rgba(255,61,90,0.3); }
.b-neut { background:rgba(107,140,255,0.12);color:var(--neutral);border:1px solid rgba(107,140,255,0.3); }
.b-bull { background:rgba(0,229,160,0.08);  color:var(--buy);  border:1px solid rgba(0,229,160,0.2); }
.b-bear { background:rgba(255,61,90,0.08);  color:var(--sell); border:1px solid rgba(255,61,90,0.2); }
.b-side { background:rgba(255,176,32,0.08); color:var(--warn); border:1px solid rgba(255,176,32,0.2); }
.b-conf-h { background:rgba(0,229,160,0.08);  color:var(--buy);  border:1px solid rgba(0,229,160,0.2); }
.b-conf-m { background:rgba(255,176,32,0.08); color:var(--warn); border:1px solid rgba(255,176,32,0.2); }
.b-conf-l { background:rgba(255,61,90,0.08);  color:var(--sell); border:1px solid rgba(255,61,90,0.2); }

.sig-body { background:var(--panel); padding:14px 16px; }
.sig-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:12px; }
.sig-cell { background:var(--panel2); border:1px solid var(--border); border-radius:8px; padding:10px 12px; }
.sc-lbl { font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:5px; }
.sc-val { font-family:var(--mono); font-size:14px; font-weight:700; }
.sc-val.entry { color:var(--neutral); }
.sc-val.sl    { color:var(--sell); }
.sc-val.tp    { color:var(--buy); }
.sc-val.rr    { color:var(--warn); }
.sc-sub { font-size:10px; color:var(--muted); margin-top:2px; font-family:var(--mono); }

.conf-wrap { margin-bottom:12px; }
.conf-top { display:flex; justify-content:space-between; margin-bottom:4px; }
.conf-lbl { font-size:10px; color:var(--muted); }
.conf-pct { font-family:var(--mono); font-size:12px; font-weight:700; }
.conf-track { height:5px; background:var(--panel2); border-radius:3px; overflow:hidden; }
.conf-fill  { height:100%; border-radius:3px; transition:width 0.7s ease; }

.reason-box {
  background:var(--panel2); border:1px solid var(--border); border-left:3px solid;
  border-radius:0 8px 8px 0; padding:10px 12px; margin-bottom:12px;
}
.reason-box.buy{border-left-color:var(--buy);} .reason-box.sell{border-left-color:var(--sell);} .reason-box.neut{border-left-color:var(--neutral);}
.r-title { font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:5px; }
.r-points { list-style:none; }
.r-points li { font-size:11px; color:var(--text); padding:2px 0; line-height:1.5; }
.r-points li::before { content:'→ '; color:var(--muted); }

.ind-row { display:grid; grid-template-columns:repeat(5,1fr); gap:7px; }
.ind-cell { background:var(--panel2); border:1px solid var(--border); border-radius:7px; padding:8px 9px; text-align:center; }
.ind-name { font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:3px; }
.ind-val { font-family:var(--mono); font-size:12px; font-weight:700; }
.ind-val.bull{color:var(--buy);} .ind-val.bear{color:var(--sell);} .ind-val.neut{color:var(--warn);}

/* CHART */
.chart-panel { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:12px 14px; }
.chart-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.chart-title-txt { font-size:12px; font-weight:600; }
.chart-meta { font-family:var(--mono); font-size:10px; color:var(--muted); }

/* ORDER BOOK mini */
.ob-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.ob-panel { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:12px 14px; }
.ob-hdr { font-size:11px; font-weight:600; margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; }
.ob-hdr-live { font-size:9px; font-family:var(--mono); color:var(--buy); display:flex; align-items:center; gap:4px; }
.ob-item { display:flex; justify-content:space-between; align-items:center; padding:3px 0; font-family:var(--mono); font-size:10px; border-bottom:1px solid rgba(30,48,96,0.3); position:relative; }
.ob-item:last-child { border-bottom:none; }
.ob-price-buy { color:var(--buy); font-weight:600; } .ob-price-sell { color:var(--sell); font-weight:600; }
.ob-qty { color:var(--muted); font-size:9px; }
.ob-bar { position:absolute; right:0; top:0; bottom:0; opacity:0.07; border-radius:2px; }
.ob-bar-buy { background:var(--buy); }
.ob-bar-sell { background:var(--sell); }
.ob-spread { text-align:center; padding:4px; font-family:var(--mono); font-size:9px; color:var(--muted); background:var(--bg2); border-radius:4px; margin:4px 0; }
.ob-spread span { color:var(--warn); font-weight:700; }

/* SIGNAL HISTORY */
.sig-history { background:var(--panel); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.sig-history-hdr { padding:10px 14px; border-bottom:1px solid var(--border); font-size:11px; font-weight:600; display:flex; align-items:center; justify-content:space-between; }
.sig-history-hdr span { font-family:var(--mono); font-size:9px; color:var(--muted); }
.sig-hist-list { max-height:160px; overflow-y:auto; }
.sig-hist-item { display:flex; align-items:center; gap:8px; padding:7px 14px; border-bottom:1px solid rgba(30,48,96,0.3); font-family:var(--mono); font-size:10px; animation:slideIn 0.3s ease; }
.sig-hist-item:last-child { border-bottom:none; }
@keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
.sh-time { color:var(--muted); font-size:9px; min-width:52px; }
.sh-coin { color:var(--white); font-weight:700; min-width:36px; }
.sh-sig { font-weight:700; min-width:56px; }
.sh-sig.buy { color:var(--buy); } .sh-sig.sell { color:var(--sell); } .sh-sig.neut { color:var(--warn); }
.sh-price { color:var(--text); }
.sh-conf { color:var(--muted); font-size:9px; margin-left:auto; }

/* SIGNAL CHANGE FLASH */
@keyframes sigFlash {
  0%   { box-shadow: 0 0 0 0 rgba(0,229,160,0.6); }
  50%  { box-shadow: 0 0 0 12px rgba(0,229,160,0); }
  100% { box-shadow: 0 0 0 0 rgba(0,229,160,0); }
}
@keyframes sigFlashSell {
  0%   { box-shadow: 0 0 0 0 rgba(255,61,90,0.6); }
  50%  { box-shadow: 0 0 0 12px rgba(255,61,90,0); }
  100% { box-shadow: 0 0 0 0 rgba(255,61,90,0); }
}
.sig-card.flash-buy { animation: sigFlash 0.7s ease; }
.sig-card.flash-sell { animation: sigFlashSell 0.7s ease; }

/* SIGNAL BADGE PULSE */
@keyframes badgePulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.7;transform:scale(1.05)} }
.badge-new { animation: badgePulse 1s ease 3; }

/* OVERVIEW TABLE */
.ov-panel { background:var(--panel); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.ov-hdr { display:flex; align-items:center; justify-content:space-between; padding:11px 14px; border-bottom:1px solid var(--border); }
.ov-title { font-size:12px; font-weight:600; }
.ov-table { width:100%; border-collapse:collapse; }
.ov-table th { font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); padding:7px 12px; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap; }
.ov-table td { padding:9px 12px; font-family:var(--mono); font-size:11px; border-bottom:1px solid rgba(30,48,96,0.35); white-space:nowrap; }
.ov-table tbody tr { cursor:pointer; transition:background 0.12s; }
.ov-table tbody tr:hover td { background:rgba(255,255,255,0.02); }
.ov-table tbody tr:last-child td { border-bottom:none; }
.ov-coin { display:flex; align-items:center; gap:7px; }
.ov-em { font-size:14px; }
.ov-sym2 { font-weight:700; color:var(--white); }
.ov-full2 { font-size:9px; color:var(--muted); font-family:var(--sans); }
.td-buy  { color:var(--buy); font-weight:700; }
.td-sell { color:var(--sell); font-weight:700; }
.td-neut { color:var(--warn); font-weight:700; }
.ord-tag { display:inline-block; padding:2px 6px; border-radius:4px; font-size:9px; font-weight:700; }
.ord-buy  { background:rgba(0,229,160,0.12); color:var(--buy); }
.ord-sell { background:rgba(255,61,90,0.12);  color:var(--sell); }
.ord-neut { background:rgba(107,140,255,0.12);color:var(--neutral); }

/* LOADING / ERROR */
.loading-ovl { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:50px; }
.spinner { width:34px; height:34px; border:3px solid var(--border); border-top-color:var(--buy); border-radius:50%; animation:spin 0.75s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.load-txt { font-family:var(--mono); font-size:12px; color:var(--muted); }
.err-box { background:rgba(255,61,90,0.06); border:1px solid rgba(255,61,90,0.2); border-radius:8px; padding:14px; font-size:12px; color:var(--sell); font-family:var(--mono); line-height:1.7; }
.disclaimer { background:rgba(255,176,32,0.05); border:1px solid rgba(255,176,32,0.15); border-radius:8px; padding:9px 13px; font-size:11px; color:var(--muted); line-height:1.6; }
.disclaimer strong { color:var(--warn); }

/* WS STATUS */
.ws-status { font-family:var(--mono); font-size:10px; color:var(--muted); display:flex; align-items:center; gap:5px; }
.ws-ok { color:var(--buy); } .ws-err { color:var(--sell); } .ws-wait { color:var(--warn); }

/* TOAST */
#toasts { position:fixed; bottom:18px; right:18px; z-index:999; display:flex; flex-direction:column; gap:5px; }
.toast { background:var(--panel2); border:1px solid var(--border2); border-radius:7px; padding:9px 13px; font-family:var(--mono); font-size:11px; color:var(--text); box-shadow:0 8px 28px rgba(0,0,0,0.5); animation:slideUp 0.22s ease; max-width:280px; }
@keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* SCROLLBAR */
::-webkit-scrollbar { width:3px; height:3px; }
::-webkit-scrollbar-track { background:var(--bg2); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* RESPONSIVE */
@media(max-width:880px) {
  .layout { grid-template-columns:1fr; }
  .sidebar { position:static; height:auto; display:flex; flex-wrap:wrap; gap:8px; padding:10px; }
  .sb-section { margin-bottom:0; }
  .sig-grid { grid-template-columns:repeat(2,1fr); }
  .ind-row  { grid-template-columns:repeat(3,1fr); }
  .ob-row   { grid-template-columns:1fr; }
}
@media(max-width:540px){
  .sig-grid { grid-template-columns:1fr 1fr; }
  .ind-row  { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>

<header class="header">
  <div class="brand">⚡ Sade<span class="brand-mark">Trade</span>
    <span style="color:var(--muted);font-size:10px;font-weight:400;margin-left:2px;">TERMINAL</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="ws-pill"><div class="dot blink"></div>Binance WebSocket</div>
    <div class="ws-status" id="wsStatus"><span class="ws-wait">⏳ Inaunganika...</span></div>
  </div>
  <div class="hdr-right">
    <div class="tick-counter">Ticks: <span id="tickCount">0</span></div>
    <div class="last-update" id="lastUpd">—</div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebarEl">
    <div style="padding:0 4px;margin-bottom:8px;">
      <div class="sb-label">Coins</div>
      <div id="coinList"></div>
      <button class="btn-all" onclick="showAll()">☰ Angalia Zote</button>
    </div>
    <hr class="sb-divider">
    <div style="padding:0 4px;">
      <div class="sb-label" style="margin-bottom:6px;">Chart Muda</div>
      <div class="tf-row">
        <button class="tf-btn active" onclick="setTF(this,'1m')">1m</button>
        <button class="tf-btn" onclick="setTF(this,'5m')">5m</button>
        <button class="tf-btn" onclick="setTF(this,'15m')">15m</button>
        <button class="tf-btn" onclick="setTF(this,'1h')">1h</button>
        <button class="tf-btn" onclick="setTF(this,'4h')">4h</button>
        <button class="tf-btn" onclick="setTF(this,'1d')">1d</button>
      </div>
    </div>
  </aside>

  <main class="main" id="mainArea">
    <div class="loading-ovl">
      <div class="spinner"></div>
      <div class="load-txt">Inaunganika Binance WebSocket...</div>
    </div>
  </main>
</div>
<div id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
// ════════════════════════════════════════
//  COINS — symbol Binance + display info
// ════════════════════════════════════════
const COINS = [
  { id:'BTC',  name:'Bitcoin',   em:'₿',  ws:'btcusdt'  },
  { id:'ETH',  name:'Ethereum',  em:'Ξ',  ws:'ethusdt'  },
  { id:'SOL',  name:'Solana',    em:'◎',  ws:'solusdt'  },
  { id:'XRP',  name:'XRP',       em:'✕',  ws:'xrpusdt'  },
  { id:'BNB',  name:'BNB',       em:'◈',  ws:'bnbusdt'  },
  { id:'DOGE', name:'Dogecoin',  em:'Ð',  ws:'dogeusdt' },
  { id:'ADA',  name:'Cardano',   em:'₳',  ws:'adausdt'  },
  { id:'AVAX', name:'Avalanche', em:'▲',  ws:'avaxusdt' },
  { id:'DOT',  name:'Polkadot',  em:'●',  ws:'dotusdt'  },
  { id:'LINK', name:'Chainlink', em:'⬡',  ws:'linkusdt' },
  { id:'TRX',  name:'TRON',      em:'⬟',  ws:'trxusdt'  },
  { id:'SHIB', name:'Shiba Inu', em:'🐕', ws:'shibusdt' },
];

// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
const S = {
  prices:    {},   // { BTC: { price, open, high, low, close, vol, chg24h, bid, ask, ... } }
  candles:   {},   // { 'BTC_1m': [{t,o,h,l,c,v},...] }
  signals:   {},   // { BTC: signalObj }
  sigHistory: [],  // [{time, coin, type, price, conf}] — max 30
  prevSigTypes: {}, // { BTC: 'BUY' } — to detect signal changes
  selected:  COINS[0],
  tf:        '1m',
  view:      'single',
  tickCount: 0,
  ws:        null,
  klineWs:   null,
  obWs:      null, // order book WebSocket
  chartInst: null,
  ready:     false,
};

// ════════════════════════════════════════
//  FORMAT
// ════════════════════════════════════════
const fP = p => {
  if (!p && p!==0) return '—';
  if (p>=1000)  return '$'+p.toLocaleString('en-US',{maximumFractionDigits:2});
  if (p>=1)     return '$'+p.toFixed(4);
  if (p>=0.0001) return '$'+p.toFixed(6);
  return '$'+p.toFixed(8);
};
const fPct = p => (p>=0?'+':'')+p.toFixed(2)+'%';
const fVol = v => {
  if (v>=1e9) return '$'+(v/1e9).toFixed(2)+'B';
  if (v>=1e6) return '$'+(v/1e6).toFixed(2)+'M';
  if (v>=1e3) return '$'+(v/1e3).toFixed(2)+'K';
  return '$'+v.toFixed(2);
};
const nowStr = () => new Date().toLocaleTimeString('sw-TZ',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

// ════════════════════════════════════════
//  BINANCE ORDER BOOK WEBSOCKET
// ════════════════════════════════════════
function connectOrderBookWS(coin) {
  if (S.obWs) { S.obWs.close(); S.obWs = null; }
  const url = `wss://stream.binance.com:9443/ws/${coin.ws}@depth10@100ms`;
  S.obWs = new WebSocket(url);
  S.obWs.onmessage = e => {
    try {
      const d = JSON.parse(e.data);
      if (!d.bids || !d.asks) return;
      updateOrderBookDOM(d.bids, d.asks);
    } catch(err) {}
  };
  S.obWs.onerror = () => {};
  S.obWs.onclose = () => {};
}

function updateOrderBookDOM(bids, asks) {
  const bEl = document.getElementById('obBids');
  const aEl = document.getElementById('obAsks');
  const spEl = document.getElementById('obSpread');
  if (!bEl || !aEl) return;

  const topBids = bids.slice(0,8);
  const topAsks = asks.slice(0,8);
  const maxBidVol = Math.max(...topBids.map(b=>parseFloat(b[1])));
  const maxAskVol = Math.max(...topAsks.map(a=>parseFloat(a[1])));

  bEl.innerHTML = topBids.map(b => {
    const p=parseFloat(b[0]), q=parseFloat(b[1]);
    const pct=((q/maxBidVol)*100).toFixed(0);
    return `<div class="ob-item">
      <span class="ob-price-buy">${fP(p)}</span>
      <span class="ob-qty">${q.toFixed(3)}</span>
      <div class="ob-bar ob-bar-buy" style="width:${pct}%"></div>
    </div>`;
  }).join('');

  aEl.innerHTML = topAsks.map(a => {
    const p=parseFloat(a[0]), q=parseFloat(a[1]);
    const pct=((q/maxAskVol)*100).toFixed(0);
    return `<div class="ob-item">
      <span class="ob-price-sell">${fP(p)}</span>
      <span class="ob-qty">${q.toFixed(3)}</span>
      <div class="ob-bar ob-bar-sell" style="width:${pct}%"></div>
    </div>`;
  }).join('');

  if (spEl && bids[0] && asks[0]) {
    const spread = parseFloat(asks[0][0]) - parseFloat(bids[0][0]);
    spEl.innerHTML = `Spread: <span>${fP(spread)}</span>`;
  }
}

// ════════════════════════════════════════
//  SIGNAL HISTORY
// ════════════════════════════════════════
function recordSignalHistory(coin, sig) {
  const prev = S.prevSigTypes[coin.id];
  if (prev === sig.type) return false; // no change
  S.prevSigTypes[coin.id] = sig.type;
  S.sigHistory.unshift({
    time: nowStr(),
    coin: coin.id,
    em: coin.em,
    type: sig.type,
    price: sig.entry,
    conf: sig.conf,
  });
  if (S.sigHistory.length > 30) S.sigHistory.pop();
  return true; // signal changed
}

function renderSignalHistory() {
  const el = document.getElementById('sigHistList');
  if (!el) return;
  if (S.sigHistory.length === 0) {
    el.innerHTML = '<div style="padding:14px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:10px;">Bado hakuna mabadiliko ya signal...</div>';
    return;
  }
  el.innerHTML = S.sigHistory.map(h => {
    const sc = h.type==='BUY'?'buy':h.type==='SELL'?'sell':'neut';
    const icon = h.type==='BUY'?'▲':h.type==='SELL'?'▼':'→';
    return `<div class="sig-hist-item">
      <span class="sh-time">${h.time}</span>
      <span class="sh-coin">${h.em} ${h.coin}</span>
      <span class="sh-sig ${sc}">${icon} ${h.type}</span>
      <span class="sh-price">${fP(h.price)}</span>
      <span class="sh-conf">${h.conf}%</span>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════
//  BINANCE WEBSOCKET — All tickers stream
// ════════════════════════════════════════
function connectTickerWS() {
  const streams = COINS.map(c => c.ws+'@ticker').join('/');
  const url = `wss://stream.binance.com:9443/stream?streams=${streams}`;

  S.ws = new WebSocket(url);

  S.ws.onopen = () => {
    setWsStatus('ok', '● Imeunganishwa');
    toast('✅ Binance WebSocket — Imeunganishwa!');
  };

  S.ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    const d = msg.data;
    if (!d || d.e !== '24hrTicker') return;

    const sym = d.s.replace('USDT','');
    S.prices[sym] = {
      price:  parseFloat(d.c),
      open:   parseFloat(d.o),
      high:   parseFloat(d.h),
      low:    parseFloat(d.l),
      close:  parseFloat(d.c),
      vol:    parseFloat(d.v) * parseFloat(d.c),
      chg24h: parseFloat(d.P),
      bid:    parseFloat(d.b),
      ask:    parseFloat(d.a),
      trades: parseInt(d.n),
    };

    S.tickCount++;
    document.getElementById('tickCount').textContent = S.tickCount;
    document.getElementById('lastUpd').textContent = nowStr();

    // Flash price in sidebar
    flashSidebarPrice(sym, parseFloat(d.P));

    // Update live price if selected
    if (sym === S.selected.id && S.view === 'single') {
      updateLivePrice(sym);
      // Re-compute signal every 5 ticks to avoid too much CPU
      if (S.tickCount % 5 === 0) recomputeAndUpdateSignal(sym);
    }

    // Mark as ready after first full batch
    if (!S.ready && Object.keys(S.prices).length >= COINS.length) {
      S.ready = true;
      renderSingle(S.selected);
      buildSidebar();
      fetchKlines(S.selected, S.tf);
    } else if (S.ready && Object.keys(S.prices).length >= COINS.length) {
      buildSidebar();
    }
  };

  S.ws.onerror = () => { setWsStatus('err','✕ Hitilafu'); };
  S.ws.onclose = () => {
    setWsStatus('wait','⏳ Kuunganisha tena...');
    setTimeout(connectTickerWS, 3000);
  };
}

function setWsStatus(cls, txt) {
  const el = document.getElementById('wsStatus');
  el.innerHTML = `<span class="ws-${cls}">${txt}</span>`;
}

// ════════════════════════════════════════
//  BINANCE REST — Klines (candles)
// ════════════════════════════════════════
async function fetchKlines(coin, interval) {
  const key = coin.id + '_' + interval;
  try {
    const limit = interval === '1m' ? 120 : interval === '5m' ? 120 : interval === '15m' ? 100 : 100;
    const url = `https://api.binance.com/api/v3/klines?symbol=${coin.id}USDT&interval=${interval}&limit=${limit}`;
    const res = await fetch(url);
    const raw = await res.json();
    S.candles[key] = raw.map(k => ({
      t: k[0], o: parseFloat(k[1]), h: parseFloat(k[2]),
      l: parseFloat(k[3]), c: parseFloat(k[4]), v: parseFloat(k[5])
    }));
    if (S.view === 'single' && S.selected.id === coin.id) drawChart(coin, interval);
    // Compute signal from candle data
    computeSignalFromCandles(coin, S.candles[key]);
  } catch(e) { console.warn('Klines error:', e); }
}

// ════════════════════════════════════════
//  KLINE WEBSOCKET (real-time candle update)
// ════════════════════════════════════════
function connectKlineWS(coin, interval) {
  if (S.klineWs) { S.klineWs.close(); S.klineWs = null; }
  const url = `wss://stream.binance.com:9443/ws/${coin.ws}@kline_${interval}`;
  S.klineWs = new WebSocket(url);
  S.klineWs.onmessage = e => {
    const msg = JSON.parse(e.data);
    const k = msg.k;
    if (!k) return;
    const key = coin.id + '_' + interval;
    if (!S.candles[key]) return;
    const last = S.candles[key][S.candles[key].length-1];
    const candle = { t:k.t, o:parseFloat(k.o), h:parseFloat(k.h), l:parseFloat(k.l), c:parseFloat(k.c), v:parseFloat(k.v) };
    if (last && last.t === k.t) {
      S.candles[key][S.candles[key].length-1] = candle; // update current candle
    } else {
      S.candles[key].push(candle); // new candle
      if (S.candles[key].length > 200) S.candles[key].shift();
    }
    if (S.view === 'single' && S.selected.id === coin.id) drawChart(coin, interval);
    computeSignalFromCandles(coin, S.candles[key]);
  };
  S.klineWs.onerror = () => {};
  S.klineWs.onclose = () => {};
}

// ════════════════════════════════════════
//  TECHNICAL ANALYSIS
// ════════════════════════════════════════
function sma(arr, n) {
  if (arr.length < n) return null;
  return arr.slice(-n).reduce((a,b)=>a+b,0)/n;
}
function ema(arr, n) {
  if (arr.length < n) return null;
  const k = 2/(n+1);
  let v = arr.slice(0,n).reduce((a,b)=>a+b,0)/n;
  for (let i=n;i<arr.length;i++) v = arr[i]*k + v*(1-k);
  return v;
}
function rsi(prices, n=14) {
  if (prices.length < n+1) return 50;
  let g=0, l=0;
  const slice = prices.slice(-n-1);
  for (let i=1;i<slice.length;i++) {
    const d = slice[i]-slice[i-1];
    if(d>0) g+=d; else l+=Math.abs(d);
  }
  const ag=g/n, al=l/n;
  if(al===0) return 100;
  return 100-(100/(1+ag/al));
}
function macd(prices) {
  if (prices.length < 26) return null;
  const e12=ema(prices,12), e26=ema(prices,26);
  if(!e12||!e26) return null;
  const line=e12-e26;
  // Signal line = 9-period EMA of MACD (simplified)
  return { line, signal: line*0.85, hist: line*0.15 };
}
function bb(prices, n=20, mult=2) {
  if (prices.length < n) return null;
  const sl = prices.slice(-n);
  const mean = sl.reduce((a,b)=>a+b,0)/n;
  const std  = Math.sqrt(sl.reduce((a,b)=>a+(b-mean)**2,0)/n);
  return { upper:mean+mult*std, mid:mean, lower:mean-mult*std };
}
function atr(candles, n=14) {
  if (candles.length < n+1) return candles[candles.length-1]?.c * 0.015 || 1;
  let sum=0;
  for (let i=candles.length-n;i<candles.length;i++) {
    const tr=Math.max(candles[i].h-candles[i].l, Math.abs(candles[i].h-candles[i-1].c), Math.abs(candles[i].l-candles[i-1].c));
    sum+=tr;
  }
  return sum/n;
}
function stochRSI(prices, period=14) {
  const r = rsi(prices, period);
  const slice = prices.slice(-period);
  const minP=Math.min(...slice), maxP=Math.max(...slice);
  return maxP===minP ? 50 : ((prices[prices.length-1]-minP)/(maxP-minP))*100;
}

function computeSignalFromCandles(coin, candles) {
  if (!candles || candles.length < 20) return;
  const closes = candles.map(c=>c.c);
  const current = closes[closes.length-1];
  const d = S.prices[coin.id] || { price:current, chg24h:0, high:current*1.01, low:current*0.99 };

  const RSI     = rsi(closes, 14);
  const SMA20   = sma(closes, 20);
  const SMA50   = sma(closes, Math.min(50,closes.length));
  const EMA12   = ema(closes, Math.min(12,closes.length));
  const EMA26   = ema(closes, Math.min(26,closes.length));
  const BB      = bb(closes, Math.min(20,closes.length));
  const MACD    = macd(closes);
  const ATR     = atr(candles, Math.min(14,candles.length-1));
  const StochRSI= stochRSI(closes, 14);

  let bull=0, bear=0, reasons=[], inds={};

  // RSI
  if (RSI < 30)      { bull+=3; reasons.push('RSI '+RSI.toFixed(0)+' — Oversold: shinikizo la kununua lipo'); inds.rsi='bull'; }
  else if (RSI < 45) { bull+=1; reasons.push('RSI '+RSI.toFixed(0)+' — Chini ya wastani, nguvu ya kununua'); inds.rsi='bull'; }
  else if (RSI > 70) { bear+=3; reasons.push('RSI '+RSI.toFixed(0)+' — Overbought: hatari ya kushuka'); inds.rsi='bear'; }
  else if (RSI > 55) { bear+=1; reasons.push('RSI '+RSI.toFixed(0)+' — Juu ya wastani, nguvu ya kuuza'); inds.rsi='bear'; }
  else               { reasons.push('RSI '+RSI.toFixed(0)+' — Katikati (neutral zone)'); inds.rsi='neut'; }

  // SMA cross
  if (SMA20 && SMA50) {
    if (SMA20 > SMA50*1.001) { bull+=2; reasons.push('SMA20 > SMA50 — Golden Cross, uptrend inaendelea'); inds.sma='bull'; }
    else if (SMA20 < SMA50*0.999) { bear+=2; reasons.push('SMA20 < SMA50 — Death Cross, downtrend inaendelea'); inds.sma='bear'; }
    else { inds.sma='neut'; }
  } else inds.sma='neut';

  // EMA
  if (EMA12 && EMA26) {
    if (EMA12 > EMA26) { bull+=1; inds.ema='bull'; }
    else { bear+=1; inds.ema='bear'; }
  } else inds.ema='neut';

  // BB
  if (BB) {
    if (current < BB.lower)        { bull+=2; reasons.push('Bei chini ya BB Lower — Bounce inaweza kutokea'); inds.bb='bull'; }
    else if (current > BB.upper)   { bear+=2; reasons.push('Bei juu ya BB Upper — Pullback inatarajiwa'); inds.bb='bear'; }
    else if (current < BB.mid)     { bull+=1; inds.bb='bull'; }
    else                            { bear+=1; inds.bb='bear'; }
  } else inds.bb='neut';

  // MACD
  if (MACD) {
    if (MACD.line > 0 && MACD.hist > 0) { bull+=2; reasons.push('MACD juu ya zero line — Nguvu ya kununua inaongezeka'); inds.macd='bull'; }
    else if (MACD.line < 0 && MACD.hist < 0) { bear+=2; reasons.push('MACD chini ya zero line — Nguvu ya kuuza'); inds.macd='bear'; }
    else { inds.macd='neut'; }
  } else inds.macd='neut';

  // StochRSI
  if (StochRSI < 20) { bull+=1; reasons.push('Stoch RSI '+StochRSI.toFixed(0)+'— Oversold level'); }
  else if (StochRSI > 80) { bear+=1; reasons.push('Stoch RSI '+StochRSI.toFixed(0)+' — Overbought level'); }

  // 24h change momentum
  if (d.chg24h > 3)  { bull+=1; reasons.push('Nguvu ya soko: +'+d.chg24h.toFixed(1)+'% leo (momentum mzuri)'); }
  if (d.chg24h < -3) { bear+=1; reasons.push('Udhaifu wa soko: '+d.chg24h.toFixed(1)+'% leo (shinikizo la soko)'); }

  const net = bull - bear;
  const conf = Math.min(95, Math.max(40, Math.round((Math.max(bull,bear)/Math.max(bull+bear,1))*100)));

  let type, trend, orderType;
  if (net >= 3) {
    type='BUY'; trend='BULLISH';
    if (RSI < 35 || (BB && current < BB.lower)) orderType = 'Buy Market';
    else if (current < (SMA20||current)*0.999)  orderType = 'Buy Limit';
    else                                          orderType = 'Buy Stop';
  } else if (net <= -3) {
    type='SELL'; trend='BEARISH';
    if (RSI > 65 || (BB && current > BB.upper)) orderType = 'Sell Market';
    else if (current > (SMA20||current)*1.001)  orderType = 'Sell Limit';
    else                                          orderType = 'Sell Stop';
  } else {
    type='NEUTRAL'; trend='SIDEWAYS'; orderType = 'Subiri — Hakuna Signal';
  }

  const entry = current;
  const slDist = ATR * 1.5, tpDist = ATR * 3;
  const sl_p = type==='BUY' ? entry-slDist : entry+slDist;
  const tp_p = type==='BUY' ? entry+tpDist : type==='SELL' ? entry-tpDist : entry+tpDist;

  S.signals[coin.id] = {
    type, trend, orderType, conf, entry, sl:sl_p, tp:tp_p,
    rr: (tpDist/Math.max(slDist,0.0001)).toFixed(1),
    rsi:RSI, sma20:SMA20, ema12:EMA12, ema26:EMA26, bb:BB, macd:MACD,
    stochRSI:StochRSI, atr:ATR,
    reasons: reasons.slice(0,5), inds,
    bull, bear,
  };

  // Record signal change in history
  const changed = recordSignalHistory(coin, S.signals[coin.id]);

  if (S.view === 'single' && S.selected.id === coin.id) {
    updateSignalUI();
    if (changed) {
      // Flash signal card
      const card = document.querySelector('.sig-card');
      if (card) {
        card.classList.remove('flash-buy','flash-sell');
        void card.offsetWidth; // reflow
        card.classList.add(type==='BUY'?'flash-buy':'flash-sell');
        setTimeout(()=>card.classList.remove('flash-buy','flash-sell'), 800);
        // Mark badges as new
        document.querySelectorAll('.badges .badge').forEach(b=>{ b.classList.add('badge-new'); setTimeout(()=>b.classList.remove('badge-new'),3000); });
      }
      toast(`⚡ ${coin.id}: Signal imebadilika → ${type}`, false);
    }
    renderSignalHistory();
  }
  // Always refresh history widget if visible
  renderSignalHistory();
}

// ════════════════════════════════════════
//  LIVE PRICE UPDATE (DOM only, no re-render)
// ════════════════════════════════════════
function updateLivePrice(sym) {
  const d = S.prices[sym]; if (!d) return;
  const priceEl = document.getElementById('liveMainPrice');
  const chgEl   = document.getElementById('liveChg');
  if (!priceEl) return;
  const cls = d.chg24h >= 0 ? 'up' : 'dn';
  const prev = parseFloat(priceEl.dataset.prev || d.price);
  priceEl.textContent = fP(d.price);
  priceEl.dataset.prev = d.price;
  priceEl.className = 'live-price ' + (d.price > prev ? 'flash-up' : d.price < prev ? 'flash-dn' : '');
  setTimeout(() => { if(priceEl) priceEl.className='live-price'; }, 400);
  if (chgEl) {
    chgEl.textContent = fPct(d.chg24h) + ' (24h)';
    chgEl.className = 'price-chg ' + cls;
  }
  // Update meta
  ['mainHigh','mainLow','mainVol'].forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      if (id==='mainHigh') el.textContent = fP(d.high);
      if (id==='mainLow')  el.textContent = fP(d.low);
      if (id==='mainVol')  el.textContent = fVol(d.vol);
    }
  });
}

function recomputeAndUpdateSignal(sym) {
  const coin = COINS.find(c=>c.id===sym);
  if (!coin) return;
  const key = sym + '_' + S.tf;
  if (S.candles[key]) computeSignalFromCandles(coin, S.candles[key]);
}

// ════════════════════════════════════════
//  UPDATE SIGNAL UI (partial DOM update)
// ════════════════════════════════════════
function updateSignalUI() {
  const sig = S.signals[S.selected.id]; if (!sig) return;
  const sc = sig.type==='BUY'?'buy':sig.type==='SELL'?'sell':'neut';

  // Update only signal-specific elements
  const typeEl = document.getElementById('sigTypeEl');
  if (typeEl) {
    typeEl.className = 'sig-type '+sc;
    typeEl.innerHTML = (sig.type==='BUY'?'▲':sig.type==='SELL'?'▼':'→') + ' ' + sig.type;
  }
  ['entryVal','slVal','tpVal','rrVal'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (id==='entryVal') el.textContent = fP(sig.entry);
    if (id==='slVal')    el.textContent = fP(sig.sl);
    if (id==='tpVal')    el.textContent = fP(sig.tp);
    if (id==='rrVal')    el.textContent = '1 : '+sig.rr;
  });
  const confEl = document.getElementById('confFill');
  const confPctEl = document.getElementById('confPct');
  if (confEl) { confEl.style.width = sig.conf+'%'; confEl.style.background = sig.conf>=70?'var(--buy)':sig.conf<=50?'var(--sell)':'var(--warn)'; }
  if (confPctEl) { confPctEl.textContent = sig.conf+'%'; confPctEl.style.color = sig.conf>=70?'var(--buy)':sig.conf<=50?'var(--sell)':'var(--warn)'; }
}

// ════════════════════════════════════════
//  FULL RENDER — single coin
// ════════════════════════════════════════
function renderSingle(coin) {
  const d   = S.prices[coin.id]; if (!d) return;
  const sig = S.signals[coin.id] || { type:'NEUTRAL',trend:'SIDEWAYS',orderType:'Inachanganua...',conf:50,entry:d.price,sl:d.price*0.985,tp:d.price*1.03,rr:'2.0',rsi:50,sma20:null,ema12:null,ema26:null,bb:null,macd:null,stochRSI:50,reasons:['Inakusanya data za kina...'],inds:{rsi:'neut',sma:'neut',ema:'neut',bb:'neut',macd:'neut'} };

  const sc   = sig.type==='BUY'?'buy':sig.type==='SELL'?'sell':'neut';
  const sBg  = sig.type==='BUY'?'buy-bg':sig.type==='SELL'?'sell-bg':'neut-bg';
  const tClass = sig.trend==='BULLISH'?'b-bull':sig.trend==='BEARISH'?'b-bear':'b-side';
  const tIcon  = sig.trend==='BULLISH'?'▲':sig.trend==='BEARISH'?'▼':'→';
  const confClass = sig.conf>=70?'b-conf-h':sig.conf<=50?'b-conf-l':'b-conf-m';
  const confColor = sig.conf>=70?'var(--buy)':sig.conf<=50?'var(--sell)':'var(--warn)';

        </div>
        <div class="badges">

      </div>
      <div class="sig-body">
        <div class="sig-grid">

            <div class="sc-val tp" id="tpVal">${fP(sig.tp)}</div>

        <div class="conf-wrap">
          <div class="conf-top">
            <span class="conf-lbl">Kiwango cha Uhakika wa Signal</span>
            <span class="conf-pct" id="confPct" style="color:${confColor}">${sig.conf}%</span>
          </div>
          <div class="conf-track"><div class="conf-fill" id="confFill" style="width:${sig.conf}%;background:${confColor}"></div></div>
        </div>

        <div class="reason-box ${sc}">
          <div class="r-title">Sababu za Signal (Uchambuzi wa Kiufundi)</div>
          <ul class="r-points">
            ${sig.reasons.map(r=>`<li>${r}</li>`).join('') || '<li>Inakusanya data za kina za candles...</li>'}
          </ul>
        </div>

        <div class="ind-row">
          <div class="ind-cell">
            <div class="ind-name">RSI (14)</div>
            <div class="ind-val ${sig.inds.rsi}">${sig.rsi?sig.rsi.toFixed(1):'—'}</div>
          </div>
          <div class="ind-cell">

          </div>
          <div class="ind-cell">

            <div class="ind-val ${sig.inds.ema}">${sig.ema12?fP(sig.ema12):'—'}</div>

          <div class="ind-cell">
            <div class="ind-name">BB Band</div>
            <div class="ind-val ${sig.inds.bb}">${sig.bb?fP(sig.bb.mid):'—'}</div>
          </div>
          <div class="ind-cell">
            <div class="ind-name">MACD</div>
            <div class="ind-val ${sig.inds.macd}">${sig.macd?sig.macd.line.toFixed(4):'—'}</div>

    <!-- ORDER BOOK + SIGNAL HISTORY -->

        </div>
        <div id="obBids">
          <div style="text-align:center;padding:20px;color:var(--muted);font-family:var(--mono);font-size:10px">Inaunganika...</div>

        <div class="sig-hist-list" id="sigHistList">
          <div style="padding:14px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:10px">Bado hakuna mabadiliko...</div>
        </div>

    <!-- CHART -->
    <div class="chart-panel">
      <div class="chart-hdr">
        <span class="chart-title-txt">📈 ${coin.id}/USDT — ${S.tf} Candles (Binance Real-time)</span>
        <span class="chart-meta" id="chartMeta">Inapakia...</span>
      </div>
      <canvas id="coinChart" height="170"></canvas>

  `;

  // Load chart data
  drawChart(coin, S.tf);
}

// ════════════════════════════════════════
//  CHART — Line from candle closes
// ════════════════════════════════════════
function drawChart(coin, interval) {
  const key = coin.id + '_' + interval;
  const candles = S.candles[key];
  if (!candles || candles.length < 2) return;

  const el = document.getElementById('coinChart');
  if (!el) return;
  if (S.chartInst) { S.chartInst.destroy(); S.chartInst = null; }

  const sig = S.signals[coin.id];
  const color = !sig ? 'var(--neutral)' : sig.type==='BUY'?'#00e5a0':sig.type==='SELL'?'#ff3d5a':'#6b8cff';

  // Sample max 150 points
  const step = Math.max(1, Math.floor(candles.length / 150));
  const data = candles.filter((_,i)=>i%step===0);

  S.chartInst = new Chart(el.getContext('2d'), {
    type: 'line',
    data: {
      labels: data.map(c => {
        const d = new Date(c.t);
        return interval.endsWith('m')
          ? d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'})
          : d.toLocaleDateString('en',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
      }),
      datasets:[{
        data: data.map(c=>c.c),
        borderColor: color,
        backgroundColor: color+'18',
        borderWidth: 1.5,
        pointRadius: 0,
        fill: true,
        tension: 0.2,
      }]
    },
    options:{
      responsive:true, animation:{ duration:0 },
      plugins:{ legend:{display:false}, tooltip:{
        backgroundColor:'#162040', borderColor:'#1e3060', borderWidth:1,
        titleColor:'#cdd8f0', bodyColor:'#4a6080',
        titleFont:{family:'IBM Plex Mono',size:9}, bodyFont:{family:'IBM Plex Mono',size:11},
        callbacks:{ label: ctx => ' '+fP(ctx.parsed.y) }
      }},
      scales:{
        x:{ ticks:{color:'#4a6080',font:{family:'IBM Plex Mono',size:9},maxTicksLimit:10}, grid:{color:'rgba(30,48,96,0.4)'} },
        y:{ ticks:{color:'#4a6080',font:{family:'IBM Plex Mono',size:9}}, grid:{color:'rgba(30,48,96,0.4)'} }
      }
    }
  });

  const metaEl = document.getElementById('chartMeta');
  if (metaEl) metaEl.textContent = `${candles.length} candles · Imesasishwa ${nowStr()}`;
}

// ════════════════════════════════════════
//  SIDEBAR
// ════════════════════════════════════════
function buildSidebar() {
  const list = document.getElementById('coinList');
  if (!list) return;
  list.innerHTML = '';
  COINS.forEach(coin => {
    const d   = S.prices[coin.id];
    const sig = S.signals[coin.id];
    const dotColor = sig ? (sig.type==='BUY'?'var(--buy)':sig.type==='SELL'?'var(--sell)':'var(--warn)') : 'var(--dim)';
    const pClass   = d ? (d.chg24h>=0?'up':'dn') : '';
    const btn = document.createElement('button');
    btn.className = 'coin-btn' + (S.selected.id===coin.id?' active':'');
    btn.onclick = () => { S.selected=coin; S.view='single'; buildSidebar(); renderSingle(coin); fetchKlines(coin,S.tf); connectKlineWS(coin,S.tf); connectOrderBookWS(coin); };
    btn.innerHTML = `
      <span style="font-size:14px">${coin.em}</span>
      <span class="coin-sym">${coin.id}</span>
      <span class="coin-price-sb ${pClass}" id="sbp_${coin.id}">${d?fP(d.price):'—'}</span>
      <span class="sig-dot" style="background:${dotColor}"></span>
    `;
    list.appendChild(btn);
  });
}

function flashSidebarPrice(sym, chg24h) {
  const el = document.getElementById('sbp_'+sym);
  if (!el) return;
  const d = S.prices[sym]; if (!d) return;
  el.textContent = fP(d.price);
  el.className = 'coin-price-sb '+(chg24h>=0?'up':'dn');
}

// ════════════════════════════════════════
//  ALL OVERVIEW
// ════════════════════════════════════════
function showAll() {
  S.view='all';
  const main = document.getElementById('mainArea');
  const rows = COINS.map(coin => {
    const d=S.prices[coin.id], sig=S.signals[coin.id];
    if(!d||!sig) return '';
    const p=d.chg24h>=0?'up-txt':'dn-txt';
    const sc=sig.type==='BUY'?'td-buy':sig.type==='SELL'?'td-sell':'td-neut';
    const oc=sig.type==='BUY'?'ord-buy':sig.type==='SELL'?'ord-sell':'ord-neut';
    const cc=sig.conf>=70?'var(--buy)':sig.conf<=50?'var(--sell)':'var(--warn)';
    return `<tr onclick="selectCoin('${coin.id}')">
      <td><div class="ov-coin"><span class="ov-em">${coin.em}</span><div><div class="ov-sym2">${coin.id}</div><div class="ov-full2">${coin.name}</div></div></div></td>
      <td id="ovp_${coin.id}">${fP(d.price)}</td>
      <td class="${p}">${fPct(d.chg24h)}</td>
      <td class="${sc}">${sig.type}</td>
      <td><span class="ord-tag ${oc}">${sig.orderType}</span></td>
      <td>${fP(sig.entry)}</td>
      <td style="color:var(--sell)">${fP(sig.sl)}</td>
      <td style="color:var(--buy)">${fP(sig.tp)}</td>
      <td>1:${sig.rr}</td>
      <td style="color:${cc}">${sig.conf}%</td>
      <td class="${sig.trend==='BULLISH'?'up-txt':sig.trend==='BEARISH'?'dn-txt':''}">${sig.trend}</td>
    </tr>`;
  }).join('');

  main.innerHTML = `
    <div class="disclaimer"><strong>⚠ Tahadhari:</strong> Signals zinatokana na data halisi za Binance. Si ushauri wa uwekezaji. Bonyeza safu yoyote kupata uchambuzi wa kina.</div>
    <div class="ov-panel">
      <div class="ov-hdr">
        <span class="ov-title">📊 Muhtasari — Coins Zote (${COINS.length}) · Data Halisi Binance</span>
        <span style="font-family:var(--mono);font-size:10px;color:var(--muted)">Inasasishwa kiotomatiki</span>
      </div>
      <div style="overflow-x:auto">
        <table class="ov-table">
          <thead><tr>
            <th>Coin</th><th>Bei</th><th>24h %</th><th>Signal</th>
            <th>Order</th><th>Entry</th><th>SL</th><th>TP</th>
            <th>R:R</th><th>Uhakika</th><th>Trend</th>
          </tr></thead>
          <tbody id="ovBody">${rows||'<tr><td colspan="11" style="text-align:center;padding:30px;color:var(--muted)">Inapakia data...</td></tr>'}</tbody>
        </table>
      </div>
    </div>`;

  // Live update overview table prices every second
  setInterval(() => {
    if (S.view !== 'all') return;
    COINS.forEach(coin => {
      const d=S.prices[coin.id]; if(!d) return;
      const el=document.getElementById('ovp_'+coin.id);
      if(el) el.textContent=fP(d.price);
    });
  }, 1000);
}

function selectCoin(id) {
  const coin = COINS.find(c=>c.id===id); if(!coin) return;
  S.selected=coin; S.view='single';
  buildSidebar(); renderSingle(coin); fetchKlines(coin,S.tf); connectKlineWS(coin,S.tf); connectOrderBookWS(coin);
}

function setTF(btn, tf) {
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  S.tf=tf;
  fetchKlines(S.selected, tf);
  connectKlineWS(S.selected, tf);
}

// ════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════
function toast(msg, isErr=false) {
  const tc=document.getElementById('toasts');
  const el=document.createElement('div');
  el.className='toast';
  if(isErr) el.style.borderColor='rgba(255,61,90,0.4)';
  el.textContent=msg;
  tc.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity 0.3s';setTimeout(()=>el.remove(),300);},4000);
}

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
buildSidebar();
connectTickerWS();
// Fetch initial klines after 2s
setTimeout(() => { fetchKlines(S.selected, S.tf); connectKlineWS(S.selected, S.tf); connectOrderBookWS(S.selected); }, 2000);
</script>
