<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SadeTrade — Crypto Signal Terminal v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');

:root {
  /* Light base */
  --bg:       #f0f4f8;
  --bg2:      #ffffff;
  --panel:    #ffffff;
  --panel2:   #f5f8fc;
  --border:   #dde3ef;
  --border2:  #c8d2e8;
  /* Signal colors */
  --buy:      #00b87a;
  --buy-light:#e6f9f3;
  --sell:     #e8334a;
  --sell-light:#fdedf0;
  --neutral:  #4b6cf7;
  --neut-light:#eef1fe;
  --warn:     #e68a00;
  --warn-light:#fff4e0;
  /* Text */
  --text:     #1e2d4a;
  --muted:    #7a8db3;
  --dim:      #c2ccde;
  --white:    #ffffff;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
  /* Dynamic signal theming */
  --sig-color:    #4b6cf7;
  --sig-light:    #eef1fe;
  --sig-border:   #c5cffc;
  --sig-bg-card:  #f4f6ff;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); font-size:13px; min-height:100vh; overflow-x:hidden; }

/* ─── HEADER ─── */
.header {
  background:var(--white); border-bottom:1px solid var(--border);
  padding:0 16px; height:52px; display:flex; align-items:center;
  justify-content:space-between; position:sticky; top:0; z-index:200;
  box-shadow:0 1px 8px rgba(30,45,74,0.06);
}
.brand { font-family:var(--mono); font-weight:700; font-size:15px; display:flex; align-items:center; gap:8px; color:var(--text); }
.brand-mark { background:linear-gradient(135deg,#00b87a,#4b6cf7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.ws-pill {
  display:flex; align-items:center; gap:6px;
  background:var(--buy-light); border:1px solid rgba(0,184,122,0.3);
  border-radius:6px; padding:4px 12px; font-family:var(--mono); font-size:11px; color:var(--buy);
}
.dot { width:7px; height:7px; border-radius:50%; background:var(--buy); }
.blink { animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.tick-counter {
  font-family:var(--mono); font-size:11px; color:var(--muted);
  background:var(--panel2); border:1px solid var(--border); border-radius:5px; padding:3px 10px;
}
.tick-counter span { color:var(--buy); font-weight:700; }
.hdr-right { display:flex; align-items:center; gap:10px; }
.last-update { font-family:var(--mono); font-size:10px; color:var(--muted); }

/* ─── LAYOUT ─── */
.layout { display:grid; grid-template-columns:200px 1fr; min-height:calc(100vh - 52px); }

/* ─── SIDEBAR ─── */
.sidebar {
  background:var(--white); border-right:1px solid var(--border);
  padding:12px 8px; overflow-y:auto; position:sticky; top:52px; height:calc(100vh - 52px);
}
.sb-label { font-family:var(--mono); font-size:9px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--muted); padding:0 6px; margin-bottom:8px; }
.coin-btn {
  display:flex; align-items:center; gap:7px; width:100%; padding:7px 8px;
  border-radius:7px; border:1px solid transparent; background:transparent;
  color:var(--text); cursor:pointer; transition:all 0.12s; margin-bottom:2px;
  font-family:var(--sans); font-size:12px; text-align:left;
}
.coin-btn:hover { background:var(--panel2); border-color:var(--border); }
.coin-btn.active { background:var(--neut-light); border-color:var(--border2); color:var(--text); }
.coin-sym { font-weight:700; font-size:12px; flex:1; }
.coin-price-sb { font-family:var(--mono); font-size:10px; color:var(--muted); transition:color 0.3s; }
.coin-price-sb.flash-up { color:var(--buy) !important; }
.coin-price-sb.flash-dn { color:var(--sell) !important; }
.sig-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.sb-divider { border:none; border-top:1px solid var(--border); margin:10px 0; }
.tf-row { display:flex; gap:4px; flex-wrap:wrap; padding:0 4px; }
.tf-btn {
  flex:1; padding:5px 3px; border-radius:5px; border:1px solid var(--border);
  background:transparent; color:var(--muted); font-family:var(--mono); font-size:10px;
  font-weight:600; cursor:pointer; transition:all 0.12s; text-align:center; min-width:28px;
}
.tf-btn:hover { color:var(--text); border-color:var(--border2); }
.tf-btn.active { background:var(--neut-light); border-color:var(--neutral); color:var(--neutral); }
.btn-all {
  width:100%; margin-top:8px; padding:7px; border-radius:6px;
  border:1px dashed var(--border2); background:transparent; color:var(--neutral);
  font-family:var(--mono); font-size:10px; cursor:pointer; transition:all 0.2s;
}
.btn-all:hover { background:var(--neut-light); }

/* ─── MAIN ─── */
.main { padding:14px; display:flex; flex-direction:column; gap:12px; overflow-y:auto; }

/* ─── COIN HEADER ─── */
.coin-header {
  background:var(--white); border:1px solid var(--border); border-radius:12px;
  padding:14px 18px; display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;
  box-shadow:0 1px 6px rgba(30,45,74,0.05);
}
.coin-title { display:flex; align-items:center; gap:10px; }
.coin-em { font-size:26px; }
.coin-sym-big { font-family:var(--mono); font-size:20px; font-weight:700; color:var(--text); }
.coin-fullname { font-size:10px; color:var(--muted); }
.live-price-wrap { text-align:right; }
.live-price { font-family:var(--mono); font-size:28px; font-weight:700; color:var(--text); transition:color 0.4s; }
.live-price.flash-up { color:var(--buy) !important; }
.live-price.flash-dn { color:var(--sell) !important; }
.price-chg { font-family:var(--mono); font-size:12px; margin-top:2px; }
.up { color:var(--buy); } .dn { color:var(--sell); }
.meta-row { display:flex; gap:14px; flex-wrap:wrap; }
.meta-item { text-align:center; }
.meta-lbl { font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }
.meta-val { font-family:var(--mono); font-size:11px; font-weight:600; color:var(--text); margin-top:2px; }

/* ─── SIGNAL CARD ─── */
.sig-card { background:var(--white); border:2px solid var(--sig-border); border-radius:12px; overflow:hidden; box-shadow:0 2px 12px rgba(30,45,74,0.07); }
.sig-head { padding:14px 18px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; background:var(--sig-light); border-bottom:1px solid var(--sig-border); }

/* Signal type specific borders & backgrounds */
.sig-card.is-buy  { border-color:rgba(0,184,122,0.4); }
.sig-card.is-sell { border-color:rgba(232,51,74,0.4); }
.sig-card.is-neut { border-color:rgba(75,108,247,0.35); }

.sig-head.buy-bg  { background:var(--buy-light);  border-bottom:1px solid rgba(0,184,122,0.2); }
.sig-head.sell-bg { background:var(--sell-light); border-bottom:1px solid rgba(232,51,74,0.2); }
.sig-head.neut-bg { background:var(--neut-light); border-bottom:1px solid rgba(75,108,247,0.2); }

.sig-type { font-family:var(--mono); font-size:24px; font-weight:700; display:flex; align-items:center; gap:8px; }
.sig-type.buy  { color:var(--buy); }
.sig-type.sell { color:var(--sell); }
.sig-type.neut { color:var(--neutral); }

/* Big direction arrow */
.sig-arrow { font-size:32px; line-height:1; }

.badges { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
.badge { font-family:var(--mono); font-size:10px; font-weight:600; padding:4px 10px; border-radius:20px; }
.b-buy  { background:var(--buy-light);  color:var(--buy);  border:1px solid rgba(0,184,122,0.35); }
.b-sell { background:var(--sell-light); color:var(--sell); border:1px solid rgba(232,51,74,0.35); }
.b-neut { background:var(--neut-light); color:var(--neutral);border:1px solid rgba(75,108,247,0.3); }
.b-bull { background:var(--buy-light);  color:var(--buy);  border:1px solid rgba(0,184,122,0.25); }
.b-bear { background:var(--sell-light); color:var(--sell); border:1px solid rgba(232,51,74,0.25); }
.b-side { background:var(--warn-light); color:var(--warn); border:1px solid rgba(230,138,0,0.25); }
.b-conf-h { background:var(--buy-light);  color:var(--buy);  border:1px solid rgba(0,184,122,0.25); }
.b-conf-m { background:var(--warn-light); color:var(--warn); border:1px solid rgba(230,138,0,0.25); }
.b-conf-l { background:var(--sell-light); color:var(--sell); border:1px solid rgba(232,51,74,0.25); }

.sig-body { background:var(--white); padding:16px 18px; }
.sig-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:14px; }
.sig-cell { background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:12px 14px; }
.sc-lbl { font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:6px; }
.sc-val { font-family:var(--mono); font-size:15px; font-weight:700; }
.sc-val.entry { color:var(--neutral); }
.sc-val.sl    { color:var(--sell); }
.sc-val.tp    { color:var(--buy); }
.sc-val.rr    { color:var(--warn); }
.sc-sub { font-size:10px; color:var(--muted); margin-top:3px; font-family:var(--mono); }

/* ─── CONFIDENCE BAR ─── */
.conf-wrap { margin-bottom:14px; }
.conf-top { display:flex; justify-content:space-between; margin-bottom:5px; }
.conf-lbl { font-size:10px; color:var(--muted); font-weight:500; }
.conf-pct { font-family:var(--mono); font-size:12px; font-weight:700; }
.conf-track { height:7px; background:var(--panel2); border-radius:4px; overflow:hidden; border:1px solid var(--border); }
.conf-fill  { height:100%; border-radius:4px; transition:width 0.7s ease; }

/* ─── VALIDITY TIMER ─── */
.validity-bar {
  background:var(--warn-light); border:1px solid rgba(230,138,0,0.25);
  border-radius:8px; padding:8px 12px; margin-bottom:14px;
  display:flex; align-items:center; justify-content:space-between;
}
.validity-label { font-size:10px; color:var(--warn); font-weight:600; font-family:var(--mono); display:flex; align-items:center; gap:5px; }
.validity-timer { font-family:var(--mono); font-size:12px; font-weight:700; color:var(--warn); }
.validity-note  { font-size:10px; color:var(--muted); }

/* ─── REASONS BOX ─── */
.reason-box {
  background:var(--panel2); border:1px solid var(--border); border-left:3px solid;
  border-radius:0 10px 10px 0; padding:12px 14px; margin-bottom:14px;
}
.reason-box.buy  { border-left-color:var(--buy); }
.reason-box.sell { border-left-color:var(--sell); }
.reason-box.neut { border-left-color:var(--neutral); }
.r-title { font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:6px; font-weight:600; }
.r-points { list-style:none; }
.r-points li { font-size:11px; color:var(--text); padding:3px 0; line-height:1.5; display:flex; align-items:flex-start; gap:5px; }
.r-arrow { color:var(--muted); flex-shrink:0; }

/* ─── INDICATORS ─── */
.ind-row { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
.ind-cell { background:var(--panel2); border:1px solid var(--border); border-radius:8px; padding:9px 10px; text-align:center; }
.ind-name { font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:4px; }
.ind-val { font-family:var(--mono); font-size:12px; font-weight:700; }
.ind-val.bull { color:var(--buy); }
.ind-val.bear { color:var(--sell); }
.ind-val.neut { color:var(--warn); }

/* ─── POSITION SIZING PANEL ─── */
.pos-panel {
  background:var(--white); border:1px solid var(--border); border-radius:12px;
  padding:16px 18px; box-shadow:0 1px 6px rgba(30,45,74,0.05);
}
.pos-title { font-size:12px; font-weight:700; color:var(--text); margin-bottom:12px; display:flex; align-items:center; gap:6px; }
.pos-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:12px; }
.pos-input-wrap { display:flex; flex-direction:column; gap:4px; }
.pos-lbl { font-size:10px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.8px; }
.pos-input {
  background:var(--panel2); border:1px solid var(--border); border-radius:7px;
  padding:8px 10px; font-family:var(--mono); font-size:12px; color:var(--text);
  outline:none; transition:border-color 0.15s; width:100%;
}
.pos-input:focus { border-color:var(--neutral); }
.pos-results { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.pos-res-cell { background:var(--panel2); border:1px solid var(--border); border-radius:8px; padding:10px 12px; text-align:center; }
.pos-res-lbl { font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:4px; }
.pos-res-val { font-family:var(--mono); font-size:14px; font-weight:700; color:var(--text); }
.pos-warning { font-size:10px; color:var(--sell); margin-top:8px; font-weight:600; display:none; }

/* ─── SENTIMENT PANEL ─── */
.sent-panel {
  background:var(--white); border:1px solid var(--border); border-radius:12px;
  padding:16px 18px; box-shadow:0 1px 6px rgba(30,45,74,0.05);
}
.sent-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.sent-block { display:flex; flex-direction:column; gap:8px; }
.sent-title { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.fg-arc-wrap { display:flex; align-items:center; gap:10px; }
.fg-num { font-family:var(--mono); font-size:28px; font-weight:700; }
.fg-label { font-size:10px; color:var(--muted); }
.ls-bar-wrap { display:flex; flex-direction:column; gap:4px; }
.ls-bar-track { height:10px; border-radius:5px; overflow:hidden; background:var(--sell-light); border:1px solid var(--border); position:relative; }
.ls-bar-fill { height:100%; background:var(--buy); border-radius:5px; transition:width 0.5s; }
.ls-labels { display:flex; justify-content:space-between; font-family:var(--mono); font-size:10px; }

/* ─── CHART PANEL ─── */
.chart-panel { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:14px 16px; box-shadow:0 1px 6px rgba(30,45,74,0.05); }
.chart-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.chart-title-txt { font-size:12px; font-weight:700; color:var(--text); }
.chart-meta { font-family:var(--mono); font-size:10px; color:var(--muted); }

/* ─── PRICE ALERT BUTTON ─── */
.alert-btn {
  display:flex; align-items:center; gap:6px; padding:8px 14px;
  border-radius:8px; border:1px solid var(--border); background:var(--panel2);
  color:var(--text); font-family:var(--mono); font-size:11px; cursor:pointer;
  transition:all 0.15s; font-weight:600;
}
.alert-btn:hover { background:var(--neut-light); border-color:var(--neutral); color:var(--neutral); }
.alert-btn.active-alert { background:var(--buy-light); border-color:var(--buy); color:var(--buy); }

/* ─── OVERVIEW TABLE ─── */
.ov-panel { background:var(--white); border:1px solid var(--border); border-radius:12px; overflow:hidden; box-shadow:0 1px 6px rgba(30,45,74,0.05); }
.ov-hdr { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border); }
.ov-title { font-size:12px; font-weight:700; color:var(--text); }
.ov-table { width:100%; border-collapse:collapse; }
.ov-table th { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); padding:8px 14px; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap; background:var(--panel2); }
.ov-table td { padding:10px 14px; font-family:var(--mono); font-size:11px; border-bottom:1px solid var(--border); white-space:nowrap; color:var(--text); }
.ov-table tbody tr { cursor:pointer; transition:background 0.1s; }
.ov-table tbody tr:hover td { background:var(--panel2); }
.ov-table tbody tr:last-child td { border-bottom:none; }
.ov-coin { display:flex; align-items:center; gap:7px; }
.ov-em { font-size:14px; }
.ov-sym2 { font-weight:700; color:var(--text); }
.ov-full2 { font-size:9px; color:var(--muted); font-family:var(--sans); }
.td-buy  { color:var(--buy) !important; font-weight:700; }
.td-sell { color:var(--sell) !important; font-weight:700; }
.td-neut { color:var(--neutral) !important; font-weight:700; }
.up-txt { color:var(--buy); } .dn-txt { color:var(--sell); }
.ord-tag { display:inline-block; padding:2px 7px; border-radius:4px; font-size:9px; font-weight:700; }
.ord-buy  { background:var(--buy-light);  color:var(--buy); }
.ord-sell { background:var(--sell-light); color:var(--sell); }
.ord-neut { background:var(--neut-light); color:var(--neutral); }

/* ─── LOADING / ERROR ─── */
.loading-ovl { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:60px; }
.spinner { width:34px; height:34px; border:3px solid var(--border); border-top-color:var(--buy); border-radius:50%; animation:spin 0.75s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.load-txt { font-family:var(--mono); font-size:12px; color:var(--muted); }
.err-box { background:var(--sell-light); border:1px solid rgba(232,51,74,0.3); border-radius:8px; padding:14px; font-size:12px; color:var(--sell); font-family:var(--mono); line-height:1.7; }
.disclaimer { background:var(--warn-light); border:1px solid rgba(230,138,0,0.2); border-radius:8px; padding:9px 14px; font-size:11px; color:var(--muted); line-height:1.6; }
.disclaimer strong { color:var(--warn); }

/* ─── WS STATUS ─── */
.ws-status { font-family:var(--mono); font-size:10px; color:var(--muted); display:flex; align-items:center; gap:5px; }
.ws-ok { color:var(--buy); } .ws-err { color:var(--sell); } .ws-wait { color:var(--warn); }

/* ─── TOAST ─── */
#toasts { position:fixed; bottom:18px; right:18px; z-index:999; display:flex; flex-direction:column; gap:5px; }
.toast { background:var(--white); border:1px solid var(--border); border-radius:8px; padding:10px 14px; font-family:var(--mono); font-size:11px; color:var(--text); box-shadow:0 4px 20px rgba(30,45,74,0.12); animation:slideUp 0.22s ease; max-width:300px; }
@keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* ─── ALERT MODAL ─── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(30,45,74,0.35); z-index:500; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--white); border:1px solid var(--border); border-radius:14px; padding:22px; width:340px; box-shadow:0 8px 40px rgba(30,45,74,0.15); }
.modal-title { font-size:14px; font-weight:700; color:var(--text); margin-bottom:14px; display:flex; align-items:center; gap:7px; }
.modal-input {
  width:100%; background:var(--panel2); border:1px solid var(--border); border-radius:8px;
  padding:10px 12px; font-family:var(--mono); font-size:13px; color:var(--text);
  outline:none; margin-bottom:10px;
}
.modal-input:focus { border-color:var(--neutral); }
.modal-note { font-size:10px; color:var(--muted); margin-bottom:14px; line-height:1.5; }
.modal-btns { display:flex; gap:8px; }
.modal-confirm {
  flex:1; padding:9px; border-radius:8px; border:none; background:var(--neutral); color:var(--white);
  font-family:var(--mono); font-size:12px; font-weight:700; cursor:pointer; transition:opacity 0.15s;
}
.modal-confirm:hover { opacity:0.85; }
.modal-cancel {
  padding:9px 16px; border-radius:8px; border:1px solid var(--border); background:transparent;
  color:var(--muted); font-family:var(--mono); font-size:12px; cursor:pointer;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* ─── RESPONSIVE ─── */
@media(max-width:880px) {
  .layout { grid-template-columns:1fr; }
  .sidebar { position:static; height:auto; display:flex; flex-wrap:wrap; gap:8px; padding:10px; }
  .sig-grid { grid-template-columns:repeat(2,1fr); }
  .ind-row  { grid-template-columns:repeat(3,1fr); }
  .pos-grid { grid-template-columns:1fr 1fr; }
  .pos-results { grid-template-columns:1fr 1fr; }
  .sent-row { grid-template-columns:1fr; }
}
@media(max-width:540px) {
  .sig-grid { grid-template-columns:1fr 1fr; }
  .ind-row  { grid-template-columns:repeat(2,1fr); }
  .pos-grid { grid-template-columns:1fr; }

<script>
// ════════════════════════════════════════
//  COINS
// ════════════════════════════════════════
const COINS = [
  { id:'BTC',  name:'Bitcoin',   em:'₿',  ws:'btcusdt'  },
  { id:'ETH',  name:'Ethereum',  em:'Ξ',  ws:'ethusdt'  },
  { id:'SOL',  name:'Solana',    em:'◎',  ws:'solusdt'  },
  { id:'XRP',  name:'XRP',       em:'✕',  ws:'xrpusdt'  },
  { id:'BNB',  name:'BNB',       em:'◈',  ws:'bnbusdt'  },
  { id:'DOGE', name:'Dogecoin',  em:'Ð',  ws:'dogeusdt' },
  { id:'ADA',  name:'Cardano',   em:'₳',  ws:'adausdt'  },
  { id:'AVAX', name:'Avalanche', em:'▲',  ws:'avaxusdt' },
  { id:'DOT',  name:'Polkadot',  em:'●',  ws:'dotusdt'  },
  { id:'LINK', name:'Chainlink', em:'⬡',  ws:'linkusdt' },
  { id:'TRX',  name:'TRON',      em:'⬟',  ws:'trxusdt'  },
  { id:'SHIB', name:'Shiba Inu', em:'🐕', ws:'shibusdt' },
];

// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
const S = {
  prices:    {},
  candles:   {},
  signals:   {},
  selected:  COINS[0],
  tf:        '1m',
  view:      'single',
  tickCount: 0,
  ws:        null,
  klineWs:   null,
  chartInst: null,
  ready:     false,
  alerts:    {}, // { 'BTC': targetPrice }
  signalTimers: {}, // validity countdown timers
};

// ════════════════════════════════════════
//  FORMAT
// ════════════════════════════════════════
const fP = p => {
  if (!p && p!==0) return '—';
  if (p>=1000)   return '$'+p.toLocaleString('en-US',{maximumFractionDigits:2});
  if (p>=1)      return '$'+p.toFixed(4);
  if (p>=0.0001) return '$'+p.toFixed(6);
  return '$'+p.toFixed(8);
};
const fPct = p => (p>=0?'+':'')+p.toFixed(2)+'%';
const fVol = v => {
  if (v>=1e9) return '$'+(v/1e9).toFixed(2)+'B';
  if (v>=1e6) return '$'+(v/1e6).toFixed(2)+'M';
  if (v>=1e3) return '$'+(v/1e3).toFixed(2)+'K';
  return '$'+v.toFixed(2);
};
const nowStr = () => new Date().toLocaleTimeString('sw-TZ',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

// TF validity in seconds
const TF_VALIDITY = {'1m':180,'5m':900,'15m':2700,'1h':7200,'4h':28800,'1d':86400};
const TF_LABEL    = {'1m':'Dakika 3','5m':'Dakika 15','15m':'Dakika 45','1h':'Masaa 2','4h':'Masaa 8','1d':'Siku 1'};

// ════════════════════════════════════════
//  BINANCE WEBSOCKET
// ════════════════════════════════════════
function connectTickerWS() {
  const streams = COINS.map(c => c.ws+'@ticker').join('/');
  const url = `wss://stream.binance.com:9443/stream?streams=${streams}`;
  S.ws = new WebSocket(url);
  S.ws.onopen = () => { setWsStatus('ok','● Imeunganishwa'); toast('✅ Binance WebSocket — Imeunganishwa!'); };
  S.ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    const d = msg.data;
    if (!d || d.e !== '24hrTicker') return;
    const sym = d.s.replace('USDT','');
    const oldPrice = S.prices[sym]?.price || 0;
    S.prices[sym] = {
      price:  parseFloat(d.c),
      open:   parseFloat(d.o),
      high:   parseFloat(d.h),
      low:    parseFloat(d.l),
      close:  parseFloat(d.c),
      vol:    parseFloat(d.v)*parseFloat(d.c),
      chg24h: parseFloat(d.P),
      bid:    parseFloat(d.b),
      ask:    parseFloat(d.a),
      trades: parseInt(d.n),
    };
    S.tickCount++;
    document.getElementById('tickCount').textContent = S.tickCount;
    document.getElementById('lastUpd').textContent = nowStr();
    flashSidebarPrice(sym, parseFloat(d.P));
    // Check price alerts
    checkPriceAlert(sym, parseFloat(d.c), oldPrice);
    if (sym === S.selected.id && S.view === 'single') {
      updateLivePrice(sym);
      if (S.tickCount % 5 === 0) recomputeAndUpdateSignal(sym);
    }
    if (!S.ready && Object.keys(S.prices).length >= COINS.length) {
      S.ready = true;
      renderSingle(S.selected);
      buildSidebar();
      fetchKlines(S.selected, S.tf);
    } else if (S.ready && Object.keys(S.prices).length >= COINS.length) {
      buildSidebar();
    }
  };
  S.ws.onerror = () => { setWsStatus('err','✕ Hitilafu'); };
  S.ws.onclose = () => { setWsStatus('wait','⏳ Kuunganisha tena...'); setTimeout(connectTickerWS, 3000); };
}

function setWsStatus(cls, txt) {
  document.getElementById('wsStatus').innerHTML = `<span class="ws-${cls}">${txt}</span>`;
}

// ════════════════════════════════════════
//  KLINES (candles)
// ════════════════════════════════════════
async function fetchKlines(coin, interval) {
  const key = coin.id + '_' + interval;
  try {
    const limit = interval==='1m'?120:interval==='5m'?120:100;
    const url = `https://api.binance.com/api/v3/klines?symbol=${coin.id}USDT&interval=${interval}&limit=${limit}`;
    const res = await fetch(url);
    const raw = await res.json();
    S.candles[key] = raw.map(k => ({
      t:k[0], o:parseFloat(k[1]), h:parseFloat(k[2]),
      l:parseFloat(k[3]), c:parseFloat(k[4]), v:parseFloat(k[5])
    }));
    if (S.view==='single' && S.selected.id===coin.id) drawChart(coin, interval);
    computeSignalFromCandles(coin, S.candles[key]);
  } catch(e) { console.warn('Klines error:', e); }
}

function connectKlineWS(coin, interval) {
  if (S.klineWs) { S.klineWs.close(); S.klineWs=null; }
  const url = `wss://stream.binance.com:9443/ws/${coin.ws}@kline_${interval}`;
  S.klineWs = new WebSocket(url);
  S.klineWs.onmessage = e => {
    const msg=JSON.parse(e.data), k=msg.k;
    if (!k) return;
    const key = coin.id+'_'+interval;
    if (!S.candles[key]) return;
    const candle={t:k.t,o:parseFloat(k.o),h:parseFloat(k.h),l:parseFloat(k.l),c:parseFloat(k.c),v:parseFloat(k.v)};
    const last=S.candles[key][S.candles[key].length-1];
    if (last&&last.t===k.t) S.candles[key][S.candles[key].length-1]=candle;
    else { S.candles[key].push(candle); if(S.candles[key].length>200) S.candles[key].shift(); }
    if (S.view==='single'&&S.selected.id===coin.id) drawChart(coin, interval);
    computeSignalFromCandles(coin, S.candles[key]);
  };
  S.klineWs.onerror=()=>{};
  S.klineWs.onclose=()=>{};
}

// ════════════════════════════════════════
//  TECHNICAL ANALYSIS
// ════════════════════════════════════════
function sma(arr,n){ if(arr.length<n)return null; return arr.slice(-n).reduce((a,b)=>a+b,0)/n; }
function ema(arr,n){
  if(arr.length<n)return null;
  const k=2/(n+1);
  let v=arr.slice(0,n).reduce((a,b)=>a+b,0)/n;
  for(let i=n;i<arr.length;i++) v=arr[i]*k+v*(1-k);
  return v;
}
function rsi(prices,n=14){
  if(prices.length<n+1)return 50;
  let g=0,l=0;
  const slice=prices.slice(-n-1);
  for(let i=1;i<slice.length;i++){const d=slice[i]-slice[i-1];if(d>0)g+=d;else l+=Math.abs(d);}
  const ag=g/n,al=l/n;
  if(al===0)return 100;
  return 100-(100/(1+ag/al));
}
function macd(prices){
  if(prices.length<26)return null;
  const e12=ema(prices,12),e26=ema(prices,26);
  if(!e12||!e26)return null;
  const line=e12-e26;
  return {line,signal:line*0.85,hist:line*0.15};
}
function bb(prices,n=20,mult=2){
  if(prices.length<n)return null;
  const sl=prices.slice(-n);
  const mean=sl.reduce((a,b)=>a+b,0)/n;
  const std=Math.sqrt(sl.reduce((a,b)=>a+(b-mean)**2,0)/n);
  return {upper:mean+mult*std,mid:mean,lower:mean-mult*std};
}
function atr(candles,n=14){
  if(candles.length<n+1)return candles[candles.length-1]?.c*0.015||1;
  let sum=0;
  for(let i=candles.length-n;i<candles.length;i++){
    const tr=Math.max(candles[i].h-candles[i].l,Math.abs(candles[i].h-candles[i-1].c),Math.abs(candles[i].l-candles[i-1].c));
    sum+=tr;
  }
  return sum/n;
}
function stochRSI(prices,period=14){
  const r=rsi(prices,period);
  const slice=prices.slice(-period);
  const minP=Math.min(...slice),maxP=Math.max(...slice);
  return maxP===minP?50:((prices[prices.length-1]-minP)/(maxP-minP))*100;
}

function computeSignalFromCandles(coin, candles) {
  if(!candles||candles.length<20)return;
  const closes=candles.map(c=>c.c);
  const current=closes[closes.length-1];
  const d=S.prices[coin.id]||{price:current,chg24h:0,high:current*1.01,low:current*0.99};

  const RSI      = rsi(closes,14);
  const SMA20    = sma(closes,20);
  const SMA50    = sma(closes,Math.min(50,closes.length));
  const EMA12    = ema(closes,Math.min(12,closes.length));
  const EMA26    = ema(closes,Math.min(26,closes.length));
  const BB       = bb(closes,Math.min(20,closes.length));
  const MACD     = macd(closes);
  const ATR      = atr(candles,Math.min(14,candles.length-1));
  const StochRSI = stochRSI(closes,14);

  let bull=0,bear=0,reasons=[],inds={};

  if(RSI<30)      {bull+=3;reasons.push('RSI '+RSI.toFixed(0)+' — Oversold: shinikizo la kununua lipo');inds.rsi='bull';}
  else if(RSI<45) {bull+=1;reasons.push('RSI '+RSI.toFixed(0)+' — Chini ya wastani, nguvu ya kununua');inds.rsi='bull';}
  else if(RSI>70) {bear+=3;reasons.push('RSI '+RSI.toFixed(0)+' — Overbought: hatari ya kushuka');inds.rsi='bear';}
  else if(RSI>55) {bear+=1;reasons.push('RSI '+RSI.toFixed(0)+' — Juu ya wastani, nguvu ya kuuza');inds.rsi='bear';}
  else            {reasons.push('RSI '+RSI.toFixed(0)+' — Katikati (neutral zone)');inds.rsi='neut';}

  if(SMA20&&SMA50){
    if(SMA20>SMA50*1.001)     {bull+=2;reasons.push('SMA20 > SMA50 — Golden Cross, uptrend inaendelea');inds.sma='bull';}
    else if(SMA20<SMA50*0.999){bear+=2;reasons.push('SMA20 < SMA50 — Death Cross, downtrend inaendelea');inds.sma='bear';}
    else{inds.sma='neut';}
  } else inds.sma='neut';

  if(EMA12&&EMA26){
    if(EMA12>EMA26){bull+=1;inds.ema='bull';}
    else{bear+=1;inds.ema='bear';}
  } else inds.ema='neut';

  if(BB){
    if(current<BB.lower)      {bull+=2;reasons.push('Bei chini ya BB Lower — Bounce inaweza kutokea');inds.bb='bull';}
    else if(current>BB.upper) {bear+=2;reasons.push('Bei juu ya BB Upper — Pullback inatarajiwa');inds.bb='bear';}
    else if(current<BB.mid)   {bull+=1;inds.bb='bull';}
    else                      {bear+=1;inds.bb='bear';}
  } else inds.bb='neut';

  if(MACD){
    if(MACD.line>0&&MACD.hist>0)   {bull+=2;reasons.push('MACD juu ya zero line — Nguvu ya kununua inaongezeka');inds.macd='bull';}
    else if(MACD.line<0&&MACD.hist<0){bear+=2;reasons.push('MACD chini ya zero line — Nguvu ya kuuza');inds.macd='bear';}
    else{inds.macd='neut';}
  } else inds.macd='neut';

  if(StochRSI<20){bull+=1;reasons.push('Stoch RSI '+StochRSI.toFixed(0)+' — Oversold level');}
  else if(StochRSI>80){bear+=1;reasons.push('Stoch RSI '+StochRSI.toFixed(0)+' — Overbought level');}

  if(d.chg24h>3)  {bull+=1;reasons.push('Nguvu ya soko: +'+d.chg24h.toFixed(1)+'% leo (momentum mzuri)');}
  if(d.chg24h<-3) {bear+=1;reasons.push('Udhaifu wa soko: '+d.chg24h.toFixed(1)+'% leo (shinikizo la soko)');}

  const net=bull-bear;
  const conf=Math.min(95,Math.max(40,Math.round((Math.max(bull,bear)/Math.max(bull+bear,1))*100)));

  let type,trend,orderType;
  if(net>=3){
    type='BUY';trend='BULLISH';
    if(RSI<35||(BB&&current<BB.lower)) orderType='Buy Market';
    else if(current<(SMA20||current)*0.999) orderType='Buy Limit';
    else orderType='Buy Stop';
  } else if(net<=-3){
    type='SELL';trend='BEARISH';
    if(RSI>65||(BB&&current>BB.upper)) orderType='Sell Market';
    else if(current>(SMA20||current)*1.001) orderType='Sell Limit';
    else orderType='Sell Stop';
  } else {
    type='NEUTRAL';trend='SIDEWAYS';orderType='Subiri — Hakuna Signal';
  }

  const entry=current;
  const slDist=ATR*1.5,tpDist=ATR*3;
  const sl_p=type==='BUY'?entry-slDist:entry+slDist;
  const tp_p=type==='BUY'?entry+tpDist:type==='SELL'?entry-tpDist:entry+tpDist;

  // Simulated long/short ratio based on signal strength
  const longPct = type==='BUY' ? Math.min(85,55+bull*3) : type==='SELL' ? Math.max(15,45-bear*3) : 50+Math.round(Math.random()*6-3);

  S.signals[coin.id] = {
    type,trend,orderType,conf,entry,sl:sl_p,tp:tp_p,
    rr:(tpDist/Math.max(slDist,0.0001)).toFixed(1),
    rsi:RSI,sma20:SMA20,ema12:EMA12,ema26:EMA26,bb:BB,macd:MACD,
    stochRSI:StochRSI,atr:ATR,
    reasons:reasons.slice(0,5),inds,
    bull,bear,longPct,
    generatedAt: Date.now(),
    tf: S.tf,
  };

  if(S.view==='single'&&S.selected.id===coin.id) updateSignalUI();
}

// ════════════════════════════════════════
//  LIVE PRICE UPDATE
// ════════════════════════════════════════
function updateLivePrice(sym) {
  const d=S.prices[sym];if(!d)return;
  const priceEl=document.getElementById('liveMainPrice');
  const chgEl=document.getElementById('liveChg');
  if(!priceEl)return;
  const prev=parseFloat(priceEl.dataset.prev||d.price);
  priceEl.textContent=fP(d.price);
  priceEl.dataset.prev=d.price;
  priceEl.className='live-price '+(d.price>prev?'flash-up':d.price<prev?'flash-dn':'');
  setTimeout(()=>{if(priceEl)priceEl.className='live-price';},400);
  if(chgEl){chgEl.textContent=fPct(d.chg24h)+' (24h)';chgEl.className='price-chg '+(d.chg24h>=0?'up':'dn');}
  ['mainHigh','mainLow','mainVol'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){
      if(id==='mainHigh')el.textContent=fP(d.high);
      if(id==='mainLow')el.textContent=fP(d.low);
      if(id==='mainVol')el.textContent=fVol(d.vol);
    }
  });
}

function recomputeAndUpdateSignal(sym) {
  const coin=COINS.find(c=>c.id===sym);if(!coin)return;
  const key=sym+'_'+S.tf;
  if(S.candles[key])computeSignalFromCandles(coin,S.candles[key]);
}

// ════════════════════════════════════════
//  UPDATE SIGNAL UI (partial DOM)
// ════════════════════════════════════════
function updateSignalUI() {
  const sig=S.signals[S.selected.id];if(!sig)return;
  const sc=sig.type==='BUY'?'buy':sig.type==='SELL'?'sell':'neut';

  const typeEl=document.getElementById('sigTypeEl');
  if(typeEl){
    typeEl.className='sig-type '+sc;
    const arrow=sig.type==='BUY'?'▲':sig.type==='SELL'?'▼':'→';
    typeEl.innerHTML=`<span class="sig-arrow">${arrow}</span> ${sig.type}`;
  }

  // Update sig-card class for border color
  const cardEl=document.getElementById('sigCard');
  if(cardEl){
    cardEl.className='sig-card is-'+(sc==='buy'?'buy':sc==='sell'?'sell':'neut');
  }

  ['entryVal','slVal','tpVal','rrVal'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    if(id==='entryVal')el.textContent=fP(sig.entry);
    if(id==='slVal')el.textContent=fP(sig.sl);
    if(id==='tpVal')el.textContent=fP(sig.tp);
    if(id==='rrVal')el.textContent='1 : '+sig.rr;
  });

  const confEl=document.getElementById('confFill');
  const confPctEl=document.getElementById('confPct');
  if(confEl){confEl.style.width=sig.conf+'%';confEl.style.background=sig.conf>=70?'var(--buy)':sig.conf<=50?'var(--sell)':'var(--warn)';}
  if(confPctEl){confPctEl.textContent=sig.conf+'%';confPctEl.style.color=sig.conf>=70?'var(--buy)':sig.conf<=50?'var(--sell)':'var(--warn)';}

  // Update long/short bar
  const lsEl=document.getElementById('lsFill');
  const lsLongEl=document.getElementById('lsLongPct');
  const lsShortEl=document.getElementById('lsShortPct');
  if(lsEl&&sig.longPct!==undefined){
    lsEl.style.width=sig.longPct+'%';
    if(lsLongEl)lsLongEl.textContent='Long '+sig.longPct+'%';
    if(lsShortEl)lsShortEl.textContent='Short '+(100-sig.longPct)+'%';
  }

  // Update reasons
  const reasonsEl=document.getElementById('reasonsList');
  if(reasonsEl){
    reasonsEl.innerHTML=sig.reasons.map(r=>`<li><span class="r-arrow">→</span>${r}</li>`).join('')||'<li><span class="r-arrow">→</span>Inakusanya data...</li>';
  }
}

// ════════════════════════════════════════
//  VALIDITY COUNTDOWN
// ════════════════════════════════════════
function startValidityTimer(sig) {
  if(S._validityInterval) clearInterval(S._validityInterval);
  const el=document.getElementById('validityTimer');
  const noteEl=document.getElementById('validityNote');
  if(!el)return;
  const validSecs=TF_VALIDITY[sig.tf]||3600;
  function tick(){
    const elapsed=Math.floor((Date.now()-sig.generatedAt)/1000);
    const remaining=Math.max(0,validSecs-elapsed);
    const m=Math.floor(remaining/60),s=remaining%60;
    el.textContent=m+':'+(s<10?'0':'')+s;
    if(remaining===0){
      el.textContent='Imekwisha';
      if(noteEl)noteEl.textContent='⚠ Signal hii imepitwa na wakati — subiri signal mpya.';
    }
  }
  tick();
  S._validityInterval=setInterval(tick,1000);
}

// ════════════════════════════════════════
//  POSITION SIZING
// ════════════════════════════════════════
function calcPositionSize() {
  const capitalEl=document.getElementById('psCapital');
  const riskEl=document.getElementById('psRisk');
  const sig=S.signals[S.selected.id];
  if(!capitalEl||!riskEl||!sig)return;

  const capital=parseFloat(capitalEl.value)||0;
  const riskPct=parseFloat(riskEl.value)||1;

  const entry=sig.entry;
  const sl=sig.sl;
  const slDist=Math.abs(entry-sl);
  const slPct=(slDist/entry)*100;

  const riskUSD=capital*(riskPct/100);
  const positionUSD= slDist>0 ? riskUSD/(slDist/entry) : 0;
  const positionCoins= entry>0 ? positionUSD/entry : 0;
  const potentialProfit= positionUSD * (parseFloat(sig.rr)||2) * (slPct/100);

  document.getElementById('psRiskUSD').textContent = capital>0?'$'+riskUSD.toFixed(2):'—';
  document.getElementById('psPositionUSD').textContent = positionUSD>0?'$'+positionUSD.toFixed(2):'—';
  document.getElementById('psProfit').textContent = potentialProfit>0?'$'+potentialProfit.toFixed(2):'—';
  document.getElementById('psProfit').style.color = potentialProfit>0?'var(--buy)':'var(--text)';

  const warn=document.getElementById('psWarning');
  if(warn) warn.style.display = (positionUSD>capital*0.5&&capital>0)?'block':'none';
}

function openAlertModal() {
  const sym=S.selected.id;
  const d=S.prices[sym];
  document.getElementById('alertCoinName').textContent=sym;
  document.getElementById('alertCurrentPrice').textContent=d?fP(d.price):'—';
  document.getElementById('alertPriceInput').value=S.alerts[sym]||'';
  document.getElementById('alertModal').classList.add('open');
}
function closeAlertModal() { document.getElementById('alertModal').classList.remove('open'); }
function confirmAlert() {
  const sym=S.selected.id;
  const val=parseFloat(document.getElementById('alertPriceInput').value);
  if(!val||val<=0){toast('⚠ Ingiza bei halali',true);return;}
  S.alerts[sym]=val;
  closeAlertModal();
  toast('🔔 Tahadhari imewekwa: '+sym+' @ '+fP(val));
  const btn=document.getElementById('alertBtn');
  if(btn)btn.classList.add('active-alert');
}
function checkPriceAlert(sym,currentPrice,prevPrice) {
  const target=S.alerts[sym];if(!target)return;
  const crossed=(prevPrice<target&&currentPrice>=target)||(prevPrice>target&&currentPrice<=target);
  if(crossed){
    toast('🔔 TAHADHARI! '+sym+' imefika '+fP(currentPrice)+' (lengo: '+fP(target)+')',false);
    delete S.alerts[sym];
    if(S.selected.id===sym){const btn=document.getElementById('alertBtn');if(btn)btn.classList.remove('active-alert');}
  }
}

function drawChart(coin, interval) {
  const key=coin.id+'_'+interval;
  const candles=S.candles[key];
  if(!candles||candles.length<2)return;
  const el=document.getElementById('coinChart');if(!el)return;
  if(S.chartInst){S.chartInst.destroy();S.chartInst=null;}

  const sig=S.signals[coin.id];
  const color=!sig?'#4b6cf7':sig.type==='BUY'?'#00b87a':sig.type==='SELL'?'#e8334a':'#4b6cf7';
  const step=Math.max(1,Math.floor(candles.length/150));
  const data=candles.filter((_,i)=>i%step===0);

  // Add entry/sl/tp annotation lines as datasets
  const labels=data.map(c=>{
    const d=new Date(c.t);
    return interval.endsWith('m')?d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'}):d.toLocaleDateString('en',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  });

  const datasets=[{
    label:'Bei',data:data.map(c=>c.c),
    borderColor:color,backgroundColor:color+'15',
    borderWidth:1.5,pointRadius:0,fill:true,tension:0.2,
  }];

  if(sig&&sig.entry){
    datasets.push({label:'Entry',data:data.map(()=>sig.entry),borderColor:'#4b6cf7',borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false,tension:0});
    datasets.push({label:'SL',data:data.map(()=>sig.sl),borderColor:'#e8334a',borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false,tension:0});
    datasets.push({label:'TP',data:data.map(()=>sig.tp),borderColor:'#00b87a',borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false,tension:0});
  }

  S.chartInst=new Chart(el.getContext('2d'),{
    type:'line',
    data:{labels,datasets},
    options:{
      responsive:true,animation:{duration:0},
      plugins:{
        legend:{display:sig?true:false,position:'top',labels:{color:'#7a8db3',font:{family:'IBM Plex Mono',size:9},boxWidth:20,padding:10}},
        tooltip:{
          backgroundColor:'#ffffff',borderColor:'#dde3ef',borderWidth:1,
          titleColor:'#1e2d4a',bodyColor:'#7a8db3',
          titleFont:{family:'IBM Plex Mono',size:9},bodyFont:{family:'IBM Plex Mono',size:11},
          callbacks:{label:ctx=>' '+fP(ctx.parsed.y)}
        }
      },
      scales:{
        x:{ticks:{color:'#7a8db3',font:{family:'IBM Plex Mono',size:9},maxTicksLimit:10},grid:{color:'rgba(221,227,239,0.6)'}},
        y:{ticks:{color:'#7a8db3',font:{family:'IBM Plex Mono',size:9}},grid:{color:'rgba(221,227,239,0.6)'}}
      }
    }
  });

  const metaEl=document.getElementById('chartMeta');
  if(metaEl)metaEl.textContent=`${candles.length} candles · Imesasishwa ${nowStr()}`;
}

function buildSidebar() {
  const list=document.getElementById('coinList');if(!list)return;
  list.innerHTML='';
  COINS.forEach(coin=>{
    const d=S.prices[coin.id],sig=S.signals[coin.id];
    const dotColor=sig?(sig.type==='BUY'?'var(--buy)':sig.type==='SELL'?'var(--sell)':'var(--warn)'):'var(--dim)';
    const pClass=d?(d.chg24h>=0?'up':'dn'):'';
    const btn=document.createElement('button');
    btn.className='coin-btn'+(S.selected.id===coin.id?' active':'');
    btn.onclick=()=>{S.selected=coin;S.view='single';buildSidebar();renderSingle(coin);fetchKlines(coin,S.tf);connectKlineWS(coin,S.tf);};
    btn.innerHTML=`
      <span style="font-size:14px">${coin.em}</span>

      <span class="sig-dot" style="background:${dotColor}"></span>

  });
}

function toast(msg,isErr=false){
  const tc=document.getElementById('toasts');
  const el=document.createElement('div');
  el.className='toast';
  if(isErr)el.style.borderColor='rgba(232,51,74,0.4)';
  el.textContent=msg;
  tc.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity 0.3s';setTimeout(()=>el.remove(),300);},4000);
}
